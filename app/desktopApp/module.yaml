product: jvm/app

apply:
  - ../../compose.module-template.yaml
  - ../../metro.module-template.yaml

settings:
  jvm:
    mainClass: org.jetbrains.kotlinconf.MainKt
  compose:
    resources:
      packageName: org.jetbrains.kotlinconf.generated.resources.desktop

dependencies:
  - ../shared
  - $compose.desktop.currentOs
  - $compose.components.resources
  - $libs.kotlinx.coroutines.swing