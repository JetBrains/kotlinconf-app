eer at Duolingo on the Animation Accelerator team working across iOS and Android. He enjoys bringing delightful animated experiences to users.","photoUrl"\:"https\://sessionize.com/image/1c82-400o400o1-wqqcbFSw6AmE3xiGsCng1d.jpg"},{"id"\:"1842f7fd-d1eb-4c82-9fa7-1128861990be","name"\:"Jolan Rensen","position"\:"Kotlin Data Science (Moonshots) Team Member at JetBrains","description"\:"I finished my Master's degree in Computer Science and Engineering at TU Eindhoven where I was always \\"that Kotlin guy\\" in group projects. That was at the end of 2021 and I've been working at JetBrains ever since. First I took up the Kotlin API for Apache Spark (since I also used that for my Thesis), but currently, I spend my time helping out with Kotlin DataFrame.","photoUrl"\:"https\://sessionize.com/image/aa7b-400o400o1-Joo8aqmfeh4AcyCX1H6zNV.jpg"},{"id"\:"72b17129-a810-480a-a9a2-db81c54cfc6d","name"\:"Joop Korteweg","position"\:"Senior Software Engineer @ RevenueCat","description"\:"My name is Joop, but I go by Jay Shortway on socials and GitHub. I'm a Kotlin developer from Rotterdam, the Netherlands. I started writing Kotlin in 2019 to supercharge my Android programming, as I was using Java before that. Pretty soon Kotlin Multiplatform piqued my interest, and I spearheaded its adoption at my company at that time. We launched a KMP app to the iOS App Store in 2020. Now at RevenueCat, I worked on bringing our existing native SDKs to the world of KMP, to help your apps make more money.","photoUrl"\:"https\://sessionize.com/image/1f6b-400o400o1-p2Queu7hipUWmaNxRfsvSw.jpg"},{"id"\:"b0bee999-8881-4c49-801e-468d04b3b387","name"\:"Kirill Skrygan","position"\:"CEO, JetBrains","description"\:"Kirill Skrygan is the CEO of JetBrains - the company behind Kotlin - driving its mission of creating tools to help the next generation of developers and engineers build the future. Before being appointed as CEO in February 2024, Kirill spent 14 years at JetBrains playing a pivotal role in shaping industry-leading software development products used by millions worldwide.\\r\\nA software developer at heart, Kirill lives in Amsterdam and is passionate about inspiring people, a skill he learned when leading over 100 athletes at the Ultimate Frisbee Club. Outside of JetBrains, he enjoys spending time and travelling with his family.","photoUrl"\:"https\://sessionize.com/image/1215-400o400o1-pSBYzsg5cmChHWznVsg4T5.png"},{"id"\:"e55a14fb-581e-456f-b87b-9b388ca21298","name"\:"Konstantin Pavlov","position"\:"Staff Software Engineer at Twilio","description"\:"Software engineer building server-side applications with Kotlin and Java. Passionate about open-source projects and AI technologies, with a focus on software excellence.","photoUrl"\:"https\://sessionize.com/image/2a66-400o400o1-Lj1VYho4NJEsxKbVQhfBMo.jpg"},{"id"\:"abc3f7f7-2169-498e-9311-744fc79e63b8","name"\:"Konstantin Tskhovrebov","position"\:"Compose Multiplatform @ JetBrains","description"\:"10+ years Android developer 5+ Kotlin developer","photoUrl"\:"https\://sessionize.com/image/e429-400o400o1-hs2u9a87QzAi5trYABN5aq.jpg"},{"id"\:"d100c85b-9098-4413-a78d-5edd0f86f3a3","name"\:"Ksenia Shneyveys","position"\:"Kotlin Education Advocate, JetBrains","description"\:"Kotlin Education Advocate, JetBrains","photoUrl"\:"https\://sessionize.com/image/6354-400o400o1-LKZghgiKTwAAK4hXJEYSes.jpg"},{"id"\:"7c29bd1a-00bd-4349-b3e8-92c47710a011","name"\:"Leonid Startsev","position"\:"Software developer at Kotlin libraries, JetBrains.","description"\:"I work at Kotlin libraries team for almost eight years, mainly on kotlinx.serialization. I'm also a former author & teacher of an Android development course in the ITMO university. I'm passionate about writing code that will give people new possibilities and I love sharing my experience with others and talking about various APIs.","photoUrl"\:"https\://sessionize.com/image/421d-400o400o1-1a-00bd-4349-b3e8-92c47710a011.1939cb8b-d24d-4ecb-a320-8a2a37f7f0c8.jpg"},{"id"\:"35f8da6a-8cfc-4e0d-9660-f616ca218e93","name"\:"Leonid Stashevskii","position"\:"JetBrains","description"\:"Ktor & Exposed TeamLead","photoUrl"\:"https\://sessionize.com/image/cd58-400o400o1-p2Y2df6UDUkvL1C77KV5Qs.jpg"},{"id"\:"6c7be28a-5b66-4646-8bcd-b534c67ee6e8","name"\:"Liliia Abdulina","position"\:"QA Lead at Kotlin, JetBrains","description"\:"Leading the QA team taking care of Kotlin & Kotlin Ecosystem quality at JetBrains. Definitely knows how to deal with complicated systems. \:)\\r\\nWith JetBrains since 2017.\\r\\nHas a developer background as well as a mobile QA; computer science education.","photoUrl"\:"https\://sessionize.com/image/c934-400o400o1-JduUmhrhDU8QmazRkNqnDT.jpg"},{"id"\:"2313d8eb-7d6e-444d-8e8d-4d223f896ce8","name"\:"Maia Grotepass","position"\:"Staff Android Engineer at Qonto","description"\:"Mobile dev since Cupcake. Android GDE. Kotlin enthusiast. Dogs make me happy.","photoUrl"\:"https\://sessionize.com/image/b7fb-400o400o1-PQ22Fj6woXrZCjkLnpk1ak.jpeg"},{"id"\:"b4cf78c9-623b-4b8f-b676-097fb7802668","name"\:"Manuel Vivo","position"\:"Staff Android Engineer","description"\:"Manuel is a Staff Android Engineer at Bumble Inc. With previous experience at Capital One and Google, he currently focuses on App Architecture, Dependency Injection and Jetpack Compose.","photoUrl"\:"https\://sessionize.com/image/418a-400o400o1-GWyY3dg6PDKAektqwZKsDE.jpg"},{"id"\:"bcd9e706-e7d2-4033-96e3-c8316a5a52ea","name"\:"Marat Akhin","position"\:"Researcher @ Kotlin Language Evolution, JetBrains","description"\:"A not-so-young researcher/developer in the field of computer science and software engineering. Has been caught multiple times participating in various R&D projects claiming to be particularly interested in programming language design and program analysis.\\r\\n\\r\\nHis PhD research saw him cheating doing industry software development in 2011, and since then their relationship has been on shaky ground. After reevaluating his priorities in 2014, he put his PhD on indeterminate hiatus and decided to focus on doing actual research. In 2018, he got involved in the development of the Kotlin language specification and, subsequently, in language design.\\r\\n\\r\\nCurrently, Marat is working as a researcher @ Kotlin Language Evolution team at JetBrains, doing various projects with and about Kotlin.","photoUrl"\:"https\://sessionize.com/image/c3e6-400o400o1-VP54QGaEBm6wQdLrpVvgyD.jpg"},{"id"\:"94b516c1-eb48-4f49-be40-c21ba0b73de2","name"\:"Marcello Galhardo","position"\:"Android @ Google","description"\:"Marcello is a seasoned software engineer with over 10 years of experience across web, backend, desktop, and Android development. Having worked in diverse teams at Quandoo, N26, and Delivery Hero, he has contributed to apps with millions of international users.\\r\\n\\r\\nCurrently, he works at the AndroidX Architecture Components Team at Google in London, having previously contributed to the SystemUI Team.","photoUrl"\:"https\://sessionize.com/image/1682-400o400o1-NMdLw8kCfsv8FKfDVBwR93.jpg"},{"id"\:"471696d0-3659-4bc2-bce4-878deb782d3a","name"\:"Marcin Moskała","position"\:"Android developer and Kotlin trainer certified by JetBrains; Author of the books;","description"\:"Marcin Moskala is an experienced Android developer, teacher, and an official Jetbrains' Kotlin training partner. He is the founder of Kt. Academy, author of the books \\"Android Development with Kotlin\\", “Effective Kotlin” and “Kotlin Coroutines. Deep dive”. He is also an active programming community member, the main author of the biggest medium publication about Kotlin, and a speaker invited to many programming conferences. ","photoUrl"\:"https\://sessionize.com/image/036f-400o400o1-7hYnGHRPX42kHbRMFppQgG.png"},{"id"\:"c3d67678-d92d-4ce2-89ee-c603ff06817a","name"\:"Marcin Mycek","position"\:"Product Manager at Kotlin Build Tools","description"\:"Theoretical physicist turned software engineer turned product manager. Marcin works at JetBrains on Kotlin Build Tools and is passionate about making the complex simple and accessible.","photoUrl"\:"https\://sessionize.com/image/43f8-400o400o1-DT9UiCxeWANeoNMwXta8Z1.jpg"},{"id"\:"56fda597-4927-4d25-9a80-4795d15ef080","name"\:"Martin Bonnin","position"\:"Mobile Engineer at ApolloGraphQL","description"\:"Martin is a maintainer of Apollo Kotlin. He has been writing Android applications since Cupcake and fell in love with Kotlin in 2017. Martin loves naming things and the sound of his laptop fan compiling all these type-safe programs. When not busy rewriting all his bash scripts in Kotlin, Martin loves to hike the Pyrénées or play a good game of Hearthstone.","photoUrl"\:"https\://sessionize.com/image/00e1-400o400o1-UiWeCMZDxPejrFsozKmLYr.jpeg"},{"id"\:"1916ae1c-96d7-480f-9eed-bf5dce444441","name"\:"Márton Braun","position"\:"Developer Advocate at JetBrains","description"\:"Márton is a Kotlin Developer Advocate at JetBrains, working on making Kotlin Multiplatform awesome. Passionate about education, he's a guest lecturer at the Budapest University of Technology and Economics.\\r\\n\\r\\nHe’s been contributing to the community through writing, speaking, and open source libraries since his university days. He is a Google Developer Expert for Android, and a co-organizer of Android Budapest.","photoUrl"\:"https\://sessionize.com/image/e76e-400o400o1-48Xecw4YZ8eXv2jhaMBiqP.png"},{"id"\:"2c45e37f-406f-4d22-ba3c-92c679f10158","name"\:"Matas Lauzadis","position"\:"Software Development Engineer at Amazon","description"\:"Matas works on the AWS SDK for Kotlin. He's interested in developer tooling, automation, and LLMs.","photoUrl"\:"https\://sessionize.com/image/5487-400o400o1-XkbyKtdMzsvBhr6BxXyXfJ.jpg"},{"id"\:"6add1648-b639-4177-8da5-c31de8537809","name"\:"Matt Dyor","position"\:"Android Product Manager focused on KMP","description"\:"Matt Dyor is focused on providing the libraries, tooling, and guidance mobile development teams need to migrate their existing Android and iOS applications to shared business logic. He is also focused on growing the Kotlin community by volunteering with the Kotlin Foundation (Education and Marketing committees). ","photoUrl"\:"https\://sessionize.com/image/81e1-400o400o1-ppMPSz6MM1Jr2kFb9Xqf7m.jpg"},{"id"\:"a72ff8a0-1557-4a92-8730-604bb0665dad","name"\:"Max Rydahl Andersen","position"\:"Distinguished Engineer, Red Hat","description"\:"Max Rydahl Andersen, a distinguished engineer working for Red Hat co-leading the Quarkus project, has worked in professional open source for the last 15+ years as a contributor to core projects like Hibernate/Hibernate Tools, WildFly, Seam, and Ceylon. Max led the team behind JBoss Tools and Red Hat Developer Studio in its first 10 years, has been heavily involved in developer tooling and currently focuses on the developer experience around Kubernetes and OpenShift.","photoUrl"\:"https\://sessionize.com/image/b948-400o400o1-SopzguBcHJd5ucHQKNpzg4.jpg"},{"id"\:"08416a0a-bb37-4e33-b1e5-2d1f2e2102eb","name"\:"Michail Zarečenskij","position"\:"Lead Language Designer @ Kotlin","description"\:"Michail Zarecenskij is a software engineer and language designer specializing in Kotlin. With nearly a decade of experience at JetBrains, Michail has played a few roles in Kotlin's evolution, including leading teams in compiler development, IDE integration, core tooling like Dokka, and language specification. Currently serving as the Lead Language Designer, he oversees the design and productization of Kotlin's features, ensuring they align with the needs of developers. His expertise spans from compiler architecture to teaching JVM programming languages","photoUrl"\:"https\://sessionize.com/image/db85-400o400o1-9QNs6tpadZ7nb7NFEaC7HC.png"},{"id"\:"30cc8bd5-49a1-4609-bf70-ff5e6b12b3c2","name"\:"Nat Pryce","position"\:"Consulting developer","description"\:"Nat has been programming for *coughty-cough* years, in various languages, platforms, application domains and industries.","photoUrl"\:"https\://sessionize.com/image/937e-400o400o1-GKiFvLXEnXby3JNFWoW6C9.jpg"},{"id"\:"94ba4fa4-aed7-482e-8096-f61090d5bb4d","name"\:"Nicole Terc","position"\:"Android Tech Lead @ HubSpot","description"\:"Android GDE, Boardgame lover, videogame addict and origami enthusiast, Nicole self taught herself to code and has been fooling around with the Android ecosystem for more than 10 years. She has participated in a diverse variety of projects for several clients around the world, including video streaming, news, social media and public transport applications. Regardless of what the current adventures have taken her, she loves finding time to play with new things and share her experience \:)","photoUrl"\:"https\://sessionize.com/image/ac6b-400o400o1-G9xcJMvyiQXy5uEyUthvFx.jpg"},{"id"\:"62216efe-dd8b-4d8b-9800-1d51b57c4001","name"\:"Pamela Hill","position"\:"Developer Advocate at JetBrains","description"\:"Pamela is a Developer Advocate for Kotlin Multiplatform at JetBrains and has more than 20 years of experience writing desktop, web and mobile apps. ","photoUrl"\:"https\://sessionize.com/image/3749-400o400o1-EDCQTVBeA2DnzdZFqo4gXa.jpg"},{"id"\:"e88b149c-324e-4dfa-93c8-2629d97576f2","name"\:"Patrick Whelan","position"\:"Senior Software Engineer","description"\:"Patrick, a.k.a Pat, is a Senior Software Engineer at the Deusche Telekom. After many years of experience with building enterprise grade backend service and applications, he now looks to help guide DT into the future with Gen AI powered technologies. ","photoUrl"\:"https\://sessionize.com/image/e05e-400o400o1-a7bFsUJzETqvqefv81AkH5.png"},{"id"\:"646237bf-ccc5-43fa-a659-0b361b08d651","name"\:"Ralf Wondratschek","position"\:"Principal Engineer at Amazon","description"\:"Ralf is a principal engineer at Amazon and helps simplify the delivery process of millions of packages. This includes providing a platform for internal and external partners to integrate their features, shipping applications for vehicles and other form factors and making the whole delivery process safer. \\r\\n\\r\\nPrior to Amazon Ralf led the feature sandboxing initiative at Square. He created and maintains several open-source projects on Github like Anvil. Anvil makes dependency injection with Dagger 2 easier and is used by many other companies like Tonal, Slack, Dropbox and Snap.","photoUrl"\:"https\://sessionize.com/image/c456-400o400o1-dd98533c-fbc1-45da-998f-53a6da1d5cf4.jpg"},{"id"\:"e27104ba-18b0-43f5-98a7-c7da70111302","name"\:"Raphael De Lio","position"\:"Developer Advocate @ Redis","description"\:"Raphael De Lio is a passionate software engineer who loves to think about solutions and ways to improve anything he touches. With over seven years of experience across multiple roles, industries, and countries, he brings a rich perspective to solving technical challenges and connecting with developer communities.\\r\\n\\r\\nBorn in Brazil, Raphael lived in Portugal for six years before moving to the Netherlands in 2022. His main role was a Software Engineer, with expertise in Java, Kotlin, and scalable systems. He also served as the organizer and host of the Dutch Kotlin User Group, building a community for Kotlin enthusiasts in Amsterdam.\\r\\n\\r\\nCurrently, he serves as a Developer Advocate at Redis, where he combines his love for coding with his enthusiasm for empowering others through education, advocacy, and community engagement.","photoUrl"\:"https\://sessionize.com/image/c55f-400o400o1-TSG5n52CXgUDWqjjdbJZiL.png"},{"id"\:"7d983480-a141-4710-bbf5-4b90c23c9b9b","name"\:"Rod Johnson","position"\:"Coder, creator, investor","description"\:"Rod is a developer, author, investor and entrepreneur. He has authored several best-selling books on Java EE. He is the creator of the Spring Framework and was cofounder and CEO of SpringSource. He has served on the board of Elastic, Neo Technologies, Apollo, Lightbend and several other successful companies. He is presently developing a structured RAG system using Spring and Kotlin.","photoUrl"\:"https\://sessionize.com/image/27b9-400o400o1-Vhh8BgCCuwosyqSAwKALdo.jpg"},{"id"\:"6de24099-9553-48f5-8880-26604621d6af","name"\:"Rodrigo Oliveira","position"\:"Senior Principal Software Engineer at Gradle Inc.","description"\:"Gradle Configuration Platform team lead and former Gradle Kotlin DSL project lead.","photoUrl"\:"https\://sessionize.com/image/5e3d-400o400o1-WtmjRJGG382uPfJyFiDVpD.jpg"},{"id"\:"c9cf4876-7b52-4bfa-9719-a473f3f5d27a","name"\:"Rodrigo Sicarelli","position"\:"Staff Software Engineer @ Stone","description"\:"Rodrigo Sicarelli is an accomplished software engineer from Brazil, deeply engaged with technology since the early days of Android 2.1. His expertise spans across backend, web, and React Native development. A passionate advocate for Kotlin, Rodrigo has been implementing it in production since version 0.8. Combining his enthusiasm for multiplatform development with a spirit of collaboration, Rodrigo actively contributes to the tech community, promoting a culture of knowledge sharing and mutual learning.","photoUrl"\:"https\://sessionize.com/image/5d26-400o400o1-4t8zPioid1A15XsFJqjBA3.jpg"},{"id"\:"7b42f61c-5e49-45ac-96a7-5d6fb0391ebd","name"\:"Ross Tate","position"\:"Programming-Languages Researcher and Consultant","description"\:"I am an independent researcher and consultant on programming-language design and implementation, currently working with the Kotlin language team. Before going independent, I was a professor at Cornell University, and I worked with the Kotlin team in its early days to integrate my research on mixed-site variance and gradual types into what became platform types. Beyond Kotlin, I have contributed to the designs of Java, Ceylon, Julia, Scala, and WebAssembly.","photoUrl"\:"https\://sessionize.com/image/7c56-400o400o1-H6RW2p9hVX3dNSfrCAFNmp.jpg"},{"id"\:"7a1d47f2-dfd1-4af1-b097-5c415f9b29c3","name"\:"Russell Wolf","position"\:"Kotlin Multiplatform Developer","description"\:"Russell started his first Kotlin Multiplatform project the day after it was possible to share code between JVM and Kotlin/Native. He is the author and maintainer of Multiplatform Settings, a key-value storage library which was one of the earliest mobile multiplatform libraries available. He loves finding new ways to connect with this community and help people and organizations use this technology. ","photoUrl"\:"https\://sessionize.com/image/7091-400o400o1-f2-dfd1-4af1-b097-5c415f9b29c3.eadbc841-6bf0-46f0-9940-e4c6ba646137.png"},{"id"\:"50c71513-a279-4f06-823f-12534a42fbe3","name"\:"Samuel Gebre Yohannes","position"\:"Senior software engineer at Framna Sweden","description"\:"Software engineer at Bontouch","photoUrl"\:"https\://sessionize.com/image/3576-400o400o1-KAkVnEpj85y3uZ6f3gEtbP.JPG"},{"id"\:"8ad4911f-2119-458d-adc0-d6bda35598cd","name"\:"Sargun Vohra","position"\:"Software Engineer @ Headway","description"\:"I’m a Software Engineer by day and OSS tinkerer by night, based in Seattle, and currently working on Trust at Headway. I enjoy finding creative and pragmatic solutions to complex challenges. Outside of code, you'll find me exploring public transit or tinkering with vintage video game consoles.","photoUrl"\:"https\://sessionize.com/image/3e32-400o400o1-YVw1UvmoFN9AvJTZPMqPzd.jpg"},{"id"\:"a82c6942-6e2b-4d80-9883-0b84b932d6ef","name"\:"Sebastian Aigner","position"\:"Developer Advocate at JetBrains","description"\:"As a Kotlin and Compose Multiplatform Developer Advocate at JetBrains, Sebastian spends a lot of time thinking about how technology can advance and inspire people. When he first tried Kotlin, it was love at first sight. He is one of the hosts of the Talking Kotlin podcast, and creates videos for the official Kotlin YouTube channel. Sebastian loves to develop networked applications, uses Kotlin on a variety of platforms, and passionately tinkers on his programs until late into the night.","photoUrl"\:"https\://sessionize.com/image/2ef9-400o400o1-XGxKBoqZvxxQxosrZHQHTT.png"},{"id"\:"2060faa7-dbea-41e1-ba1e-107b58b960a2","name"\:"Sebastian Sellmair","position"\:"Software Engineer, JetBrains","description"\:"Software Engineer at JetBrains, working on all things Kotlin, IntelliJ, KMP","photoUrl"\:"https\://sessionize.com/image/036e-400o400o1-9WwFFCueTqvFCQetfdMrU8.jpg"},{"id"\:"e397fee8-078f-4694-8a1f-35b1d57f1fce","name"\:"Sebastiano Poggi","position"\:"UX Engineer at Google working on Android Developer UX","description"\:"Emerging from the foggy plains of northern Italy 🇮🇹 after working at a smartwatch startup, Sebastiano moved with his curls to London 🇬🇧 💂 to do great things at AKQA and then Novoda. After a few years at JetBrains, he's now joined Google and is in Italy once again 🇮🇹. He really wishes he had more time to write technical articles on his blog, but he's live coding on Twitch in the meantime on [https\://codewiththeitalians.it](https\://codewiththeitalians.it)","photoUrl"\:"https\://sessionize.com/image/ff9e-400o400o1-BPpvfRRxNbAKepJruufHDH.jpg"},{"id"\:"ce11156d-9a41-4f12-b236-3bdac0ee3a2a","name"\:"Sébastien Deleuze","position"\:"Spring Framework core committer","description"\:"Sébastien is a Spring Framework core committer at Broadcom. He has introduced Kotlin support in Spring, and works on integrating various technologies with the goal to improve Spring applications efficiency on production (GraalVM, Project CRaC, CDS, Project Leyden). He is also a WebAssembly believer since 2016, a Kotlin Google Developer Expert and is a former MiXiT conference staff member.","photoUrl"\:"https\://sessionize.com/image/621b-400o400o1-467bbf4d-72b9-42eb-a0f8-4930821ddc8f.jpg"},{"id"\:"8466c9d8-0d23-41da-a283-80632a241057","name"\:"Sergei Rybalkin","position"\:"Kotlin @ Meta","description"\:"Sergei works with JVM-based languages for more than 10 years. At Meta he is adopting and optimising Kotlin for Android. Before joining Facebook Sergei worked on Kotlin adoption for server side and frameworks at Alibaba Group.","photoUrl"\:"https\://sessionize.com/image/ffe1-400o400o1-wsXPDku78WyuH8dgTMEjA7.jpg"},{"id"\:"ea32e9a2-b68e-44c5-b4b7-6d2aa0dc3141","name"\:"Simon Vergauwen","position"\:"Developer Advocate at JetBrains & OSS (arrow-kt) Maintainer","description"\:"Software engineer from Antwerp, Belgium. Interested in everything functional, and Kotlin. Loves OSS, cooking, snowboarding and Fallout.","photoUrl"\:"https\://sessionize.com/image/6718-400o400o1-fjw7kgxgtgQxuPy5N8d4np.png"},{"id"\:"0f769b19-d5f2-49fb-aa78-a086aa046b7e","name"\:"Svetlana Isakova","position"\:"Developer Advocate, JetBrains","description"\:"Svetlana Isakova has worked on the Kotlin language at JetBrains. She’s co-authored the books \\"Kotlin in Action\\" and \\"Atomic Kotlin\\" and now is a Developer Advocate, where she spends her time teaching Kotlin and speaking at conferences worldwide. ","photoUrl"\:"https\://sessionize.com/image/5daa-400o400o1-9juRv43WFGQcGhJ31eGWsE.jpg"},{"id"\:"969813cd-0231-4310-9c61-745967bd94c5","name"\:"Tadeas Kriz","position"\:"Senior Kotlin Developer at Touchlab","description"\:"Tadeas is a Senior Mobile Developer at Touchlab, experimenting with Kotlin compiler plugins. Began as a PHP developer, moving to .NET desktop apps later on. Finally landing in mobile development with Android first and then falling in love with iOS. Fortunately, Kotlin Multiplatform happened, opening the path to doing both mobile platforms.","photoUrl"\:"https\://sessionize.com/image/8dd1-400o400o1-RW6sTdV194VWGAsCKa7PYE.jpg"},{"id"\:"9b5010cc-c3d5-4a24-aadd-c43c022ab186","name"\:"Tristan Hamilton","position"\:"Tech Lead at HubSpot, Mobile Devex and Infra","description"\:"9+ years of software development experience, working mainly with jvm languages on a variety of projects from devex to android development. \\r\\ncurrent focus\: mobile devex\!\\r\\npartial to\: Functional programming\!\\r\\nfavorite animal\: my cats\!\\r\\n","photoUrl"\:"https\://sessionize.com/image/0ba4-400o400o1-MupB49ikhSXaYuJEectpAD.jpg"},{"id"\:"8494966a-aff2-4539-81f8-8a3d0e15431f","name"\:"Troels Lund","position"\:"Kotlin/Native Lead at Google","description"\:"Troels is a SWE at Google, leading the Kotlin/Native compiler and runtime team.","photoUrl"\:"https\://sessionize.com/image/3517-400o400o1-sZXp21ku3anxPcLZT6GrUR.jpg"},{"id"\:"6a3de662-ef86-4c62-bb68-2f7ebe607f76","name"\:"Ty Smith","position"\:"Principal Engineer at Uber, Platform Engineering","description"\:"Ty is a Principal Engineer at Uber in Platform engineering and is the chairman of Uber's Open-Source program. He's focused on developer productivity and strives to help engineers ship fast high-quality products. He has a passion for AI, dev tools, frameworks, mobile apps, and open-source.  He co-chairs the Mobile Native Foundation and is a Google Developer Expert for Android and Kotlin. He gives regular conference presentations, works on open-source, writes, and organizes community events. He is an angel investor, startup advisor, and a limited partner in several venture capital groups. Ty has been at Uber for 8 years and prior he worked at Twitter as a lead on Fabric developer tools, Evernote, cofounded a startup, and worked at a variety of smaller startups and consulting firms","photoUrl"\:"https\://sessionize.com/image/b693-400o400o1-YapSn4nbXFLtK5vNm8KKrA.jpg"},{"id"\:"7df2c791-134f-4279-bb68-23f8899bb1ac","name"\:"Urs Peter","position"\:"Urs Peter Senior Software Engineer and JetBrains certified Kotlin Trainer ","description"\:"Urs is a seasoned software engineer, solution architect, conference speaker, and trainer with over 20 years of experience in building resilient, scalable, and mission-critical systems, mostly involving Kotlin and Scala. \\r\\n\\r\\nBesides his job as a consultant, he is also a passionate trainer and author of a great variety of courses ranging from language courses for Kotlin and Scala to architectural trainings such as Microservices and Event-Driven Architectures.\\r\\n\\r\\n As a people person by nature, he loves to share knowledge and inspire and get inspired by peers on meetups and conferences. Urs is a JetBrains certified Kotlin trainer.","photoUrl"\:"https\://sessionize.com/image/a3f7-400o400o1-QYUavRYyARnAVJLCpM1m8M.png"},{"id"\:"f5ae677d-785e-4af9-a746-3fcca5a351fe","name"\:"Vanessa Johnson","position"\:"Associate Android Engineer @ The New York Times","description"\:"Vanessa Johnson is an Associate Android Engineer at The New York Times working on the Games Android app. She specializes in UI features and loves building mobile apps. She is passionate about accessibility and is also working on an iOS side project that will help people manage their digestive issues like Crohns and IBS. When she isn’t coding she is usually playing pickup basketball or watching a horror movie.","photoUrl"\:"https\://sessionize.com/image/f054-400o400o1-nZsAPUozif1h4s4DjGCuSP.jpg"},{"id"\:"e21ee3c3-2e72-4fd2-8e5c-30511e30fe66","name"\:"Victor Kropp","position"\:"Compose Multiplatform Team Lead at JetBrains","description"\:"Victor is Compose Multiplatform Team Lead at JetBrains, where he participated in many projects including ReSharper, dotCover, Hub, Toolbox App and others. He is passionate about great user interfaces and efficient ways of creating them. In his free time Victor runs marathons and long-distance triathlons or hikes in the Alps with his family.","photoUrl"\:"https\://sessionize.com/image/4840-400o400o1-HaxsKG7s7WXGXzcj7VpGdN.jpg"},{"id"\:"4f858987-1a60-4da8-a4a2-045824a496c7","name"\:"Viktor Gamov","position"\:"Principal Developer Advocate, Confluent","description"\:"Viktor Gamov is a Principal Developer Advocate at Confluent, founded by the original creators of Apache Kafka®. With a rich background in implementing and advocating for distributed systems and cloud-native architectures, Viktor excels in open-source technologies. He is passionate about assisting architects, developers, and operators in crafting systems that are not only low in latency and scalable but also highly available.\\r\\nAs a Java Champion and an esteemed speaker, Viktor is known for his insightful presentations at top industry events like JavaOne, Devoxx, Kafka Summit, and QCon. His expertise spans distributed systems, real-time data streaming, JVM, and DevOps.\\r\\nViktor has co-authored \\"Enterprise Web Development\\" from O'Reilly and \\"Apache Kafka® in Action\\" from Manning. \\r\\nFollow Viktor on X—@gamussa to stay updated with his latest thoughts on technology, his gym and food adventures, and insights into open-source and developer advocacy.","photoUrl"\:"https\://sessionize.com/image/6748-400o400o1-hPfwgfvR42tzoHnqnxe9Fm.jpg"},{"id"\:"b2a19517-6d18-4ec1-9c40-7e29f4d862b1","name"\:"Vsevolod Tolstopyatov","position"\:"JetBrains, Kotlin Core Ecosystem Lead","description"\:"Having fun in Kotlin team, poking APIs, libraries, languages, and tools. Passionate and curious about API design, concurrency, low-level programming, and performance","photoUrl"\:"https\://sessionize.com/image/e373-400o400o1-WCCD7rmPgu4DFDYpfxNYK6.png"}]}
