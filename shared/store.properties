the positives and negatives\: overwhelmingly, positives. \\r\\n\\r\\nKotlin brings a modern language to a mature, hardened ecosystem and productive, high quality framework. The result can be a thing of beauty. \\r\\n\\r\\n","speakerIds"\:["7d983480-a141-4710-bbf5-4b90c23c9b9b"],"location"\:"Hall D3","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T11\:00","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"814689","title"\:"Code Quality at Scale\: Future-Proof Your Android Codebase with KtLint and Detekt","description"\:"Managing a large, multi-team Kotlin codebase that has grown and evolved over eight years is no small feat. Introducing architectural changes and ensuring alignment across multiple autonomous teams adds another layer of complexity.\\r\\n\\r\\nIn this talk, you’ll learn strategies to build more robust, maintainable, and future-ready codebases, whether you’re scaling a project or working in a large team. We’ll show how integrating static analysis tools like Ktlint and Detekt into your CI pipeline can help you establish consistent coding standards and systematically reduce technical debt. As a bonus, we’ll explore how we were able to leverage custom Detekt rules to help us safely enable r8 in a multimodule Android app.","speakerIds"\:["9b5010cc-c3d5-4a24-aadd-c43c022ab186"],"location"\:"Hall D2","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T11\:00","tags"\:["Regular session","Intermediate","Android","Language and best practices"]},{"id"\:"793515","title"\:"Deploying Kotlin Multiplatform at Google Workspace","description"\:"I like to talk you through some of the bugs we found and optimizations as we launched Kotlin Multiplatform to some users with Google Workspace.   We'll talk through some bugs, performance issues and fixes with comparisons to ObjectiveC.   As well as a Q/A with the developers of worked on this.","speakerIds"\:["4f541219-75cb-4e12-a1e9-4d9382652d0d","e0b10be3-e19b-405d-a875-53bd4621fdb9"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T11\:00","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"793888","title"\:"Building an Agentic Platform with Kotlin\: Powering one of Europe's Largest LLM Bot","description"\:"How does one build a multi-tenant, multi-channel enterprise application for multiple European countries with a new and non-deterministic technology such as LLMs?\\r\\n\\r\\nThis is the question my team and I asked ourselves over a year and a half ago.\\r\\n\\r\\nJoin me in my talk to discover how we helped build one of Europe's biggest LLM chatbots and how this led to Arc, an open-sourced Kotlin-based AI framework that is now part of the Eclipse Foundation.\\r\\n\\r\\nWhat makes Arc interesting is how it combines Kotlin DSL and scripting to enable developers to build LLM-powered agents fast and efficiently, and most importantly, ready for the enterprise.\\r\\n\\r\\nIn this session, we will go through the journey of how and why the framework was born.\\r\\n\\r\\nWe'll take a look at some of the design decisions that were made and some of the key features of the framework, such as observability, memory, and tools, highlighting how we tackle some of our biggest challenges.\\r\\n\\r\\nAt the end of this session, you should have a good understanding of the challenges in building an LLM application at this scale, as well as some strategies for solving these problems.","speakerIds"\:["e88b149c-324e-4dfa-93c8-2629d97576f2"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T11\:00","tags"\:["Regular session","Intermediate","Server-side","Extensibility/Tooling","Other"]},{"id"\:"795861","title"\:"Compose Prototyping in Kotlin Notebooks","description"\:"With its unique mix of markdown and REPL-like nature, Kotlin Notebooks is an excellent way to document or explore a new idea or an existing codebase. But did you know that Notebooks also support Compose and Swing?\\r\\n\\r\\nIn this lighting talk you will see how you can set up Notebooks to access existing UI code or write new from scratch, with the result being shown directly in the notebook. And as a bonus on top, all of this can shared directly as documentation on Github or in Gists.","speakerIds"\:["d4750b02-7983-4201-9740-839fbb3efb08"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T10\:30","tags"\:["Lightning talk","Introductory and overview","Multiplatform","Android"]},{"id"\:"897869","title"\:"Setting up your Mac for Kotlin Multiplatform Development","description"\:"If you have not built with KMP yet, you will probably have to install some software (e.g., Xcode, iOS Simulator, Android Studio Meerkat | 2024.3.1 or later). We recommend that you come to KotlinConf with all of your KMP software installed as these applications are large and may take hours to install. But for those who need some help in getting everything set up, please join us.","speakerIds"\:["6add1648-b639-4177-8da5-c31de8537809","6b8c2666-a975-4a5f-9ee0-5f28f3e445ee"],"location"\:"Room \#173","startsAt"\:"2025-05-22T10\:15","endsAt"\:"2025-05-22T11\:00","tags"\:["Codelab","Introductory and overview"]},{"id"\:"786515","title"\:"State of Kotlin/Wasm and Compose Multiplatform for Web on Modern Browsers","description"\:"Kotlin/Wasm and Compose Multiplatform for web allow Kotlin Multiplatform developers to extend their reach to the modern browser. In this lightning talk, I’ll describe the current state of the platform and what the JetBrains team is working on as we prepare for the Beta release.\\r\\n\\r\\nI will also be sharing some key lessons learnt extending the KotlinConf app to the browser, giving a better understanding of what the developer experience of using Kotlin/Wasm and Compose Multiplatform for web is like. ","speakerIds"\:["62216efe-dd8b-4d8b-9800-1d51b57c4001"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T10\:45","endsAt"\:"2025-05-22T11\:00","tags"\:["Lightning talk","Introductory and overview","Multiplatform"]},{"id"\:"41c114c5-e982-4d94-82ae-0911d56611f7","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T11\:00","endsAt"\:"2025-05-22T11\:15","tags"\:[]},{"id"\:"762779","title"\:"Rich Errors in Kotlin","description"\:"Kotlin's nullability model is one of its core features. In this talk, we’ll explore how this model can be generalized to restricted union types specifically designed for handling error cases. \\r\\n\\r\\nAdditionally, we’ll discuss how errors can currently be represented in Kotlin, covering approaches such as nullable types, exceptions, sealed hierarchies, and Result-like classes.","speakerIds"\:["08416a0a-bb37-4e33-b1e5-2d1f2e2102eb"],"location"\:"Hall D3","startsAt"\:"2025-05-22T11\:15","endsAt"\:"2025-05-22T12\:00","tags"\:["Regular session","Intermediate","Language and best practices"]},{"id"\:"794504","title"\:"What’s new in Amper","description"\:"Amper is an experimental, standalone build tool for the Kotlin Multiplatform and JVM ecosystem from JetBrains. In this talk, we'll look at what Amper is already capable of. We’ll dip our toes together into the design principles behind Amper, and see how they find their reflection in the major features, choices and tradeoffs of Amper.\\r\\n\\r\\nAnd of course - I’ll share a sneak peek into what the team is cooking, and what one might expect from Amper in the future\!","speakerIds"\:["97821c92-d14b-470b-8311-dc7cafff3c28"],"location"\:"Hall D2","startsAt"\:"2025-05-22T11\:15","endsAt"\:"2025-05-22T12\:00","tags"\:["Regular session","Introductory and overview","Multiplatform","Extensibility/Tooling"]},{"id"\:"795179","title"\:"Next level Kotlin support in Spring Boot 4","description"\:"Spring and Kotlin teams collaborate to bring the Kotlin support to the next level in the upcoming Spring Boot 4 release, based on Spring Framework 7, to be released at the end of 2025.\\r\\n\\r\\nIn this brand new talk, Sébastien will share new features that intend to improve the developer experience and runtime efficiency of Spring Boot applications for Kotlin developers.\\r\\n\\r\\nHe will cover the new Kotlin 2 baseline, runtime efficiency improvements, better null-safety via JSpecify, GraalVM native image special Kotlin support, new DSLs, new Kotlin documentation and Spring AI Kotlin support.","speakerIds"\:["ce11156d-9a41-4f12-b236-3bdac0ee3a2a"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T11\:15","endsAt"\:"2025-05-22T12\:00","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"800713","title"\:"Creative UIs with Compose","description"\:"While most folks associate Compose UI with Material, its API allows us to be more expressive than ever before.\\r\\n\\r\\nMobile UIs have become homogenized and stale, but video games continue to provide a wealth of innovation and creativity.\\r\\n\\r\\nIn this session we'll recreate a complex user interface from the game Persona 5 to showcase how to really push Compose beyond Material Design. Topics include\:\\r\\n- Drawing custom shapes\\r\\n- Animating path data\\r\\n- Non-standard shapes in LazyColumn/LazyRow\\r\\n- Custom effects inside LazyColumn/LazyRow\\r\\n- Remaining usable and accessible when not using Material\\r\\n- How/why video games can be a source of inspiration","speakerIds"\:["ea8b9ce3-c07c-4683-9e4e-81f6680e896d"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T11\:15","endsAt"\:"2025-05-22T12\:00","tags"\:["Regular session","Intermediate","Multiplatform","Android"]},{"id"\:"867231","title"\:"Model Context Protocol in Kotlin","description"\:"MCP is an open protocol that standardizes how applications provide context to LLMs. We've created a Kotlin library that allows you to use this protocol and connect AI models to tooling, like IDEs. Now we will see how it works in practice.","speakerIds"\:["155ea7e0-6dc1-45c7-94c8-055475838101"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T11\:15","endsAt"\:"2025-05-22T11\:30","tags"\:["Lightning talk","Intermediate","Other"]},{"id"\:"812350","title"\:"Kotlin's Gam[e]bit\: LLM-less AI for Board Games","description"\:"Discover how Kotlin can power AI without relying on large language models. In this session, we'll explore preparing data using Kotlin Notebooks, training machine learning models directly in Kotlin, and implementing a strategy-driven bot for an online board game. Whether you're a Kotlin enthusiast or curious about alternative approaches to AI, this talk will show how Kotlin shines as a tool for building efficient, specialized AI systems","speakerIds"\:["c7d1ceec-12db-4c2b-9a93-a9d70b6938cd"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T11\:45","endsAt"\:"2025-05-22T12\:00","tags"\:["Lightning talk","Intermediate","Server-side","Other"]},{"id"\:"2b658226-9764-4141-8318-99b65b737807","title"\:"Lunch","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T12\:00","endsAt"\:"2025-05-22T13\:00","tags"\:[]},{"id"\:"792910","title"\:"From 0 to h-AI-ro\: high-speed track to AI for Kotlin developers","description"\:"With the advent of ChatGPT and other generative AI models, artificial intelligence has expanded exponentially, unlocking possibilities beyond our wildest imaginations while simultaneously challenging the established way of doing. How does this exciting (r?)evolution impact us Kotlin developers?\\r\\n\\r\\nIn this talk, we will dive deeply into AI to equip you with a broad overview of AI terminology, concepts, and possibilities within the Kotlin ecosystem. This will empower you to harness AI's transformative potential in your projects. So, yes, we will go far beyond your AI coding assistant, and no, you don't need to be a data scientist or math hero to understand the contents.\\r\\n\\r\\nGet to know\:\\r\\n- Basic machine learning concepts\: datasets, predictions, classification, and anomaly detection using Kotlin notebooks.\\r\\n- Deep learning with KotlinDL\: object detection, speech recognition, and natural language processing.\\r\\n- Generative AI 101\: (large) language models (LLMs), embeddings, vector databases, retrieval-augmented generation (RAG), AI-Agents\\r\\n- Integrating AI into server-side and mobile applications using frameworks like Langchain4j and Spring-AI\\r\\n\\r\\nThrough interactive examples and live coding, you will gain insights into how Kotlin can be leveraged with cutting-edge AI technologies, opening doors to innovative possibilities in content generation, natural language processing, computer vision, and more.\\r\\n\\r\\nBy the end of this session, you will emerge with a comprehensive understanding of AI's potential within the Kotlin ecosystem. Armed with this knowledge, you’ll be prepared to embrace the future as a H-AI-ro\!","speakerIds"\:["7df2c791-134f-4279-bb68-23f8899bb1ac"],"location"\:"Hall D3","startsAt"\:"2025-05-22T13\:00","endsAt"\:"2025-05-22T13\:45","tags"\:["Regular session","Intermediate","Server-side","Extensibility/Tooling","Language and best practices"]},{"id"\:"795318","title"\:"The Life and Death of a Kotlin/Native Object","description"\:"Have you ever wondered what the Kotlin/Native runtime does? What actually happens, under the hood, when you instantiate an object? How is an object layed out? How does the runtime manage memory? What happens when an object is no longer needed?\\r\\n\\r\\nIn this talk, you will get a look at how all these problems are solved by the Kotlin/Native runtime. This is a high level talk about a very low level topic; you only need to know a bit of Kotlin to follow along.","speakerIds"\:["8494966a-aff2-4539-81f8-8a3d0e15431f"],"location"\:"Hall D2","startsAt"\:"2025-05-22T13\:00","endsAt"\:"2025-05-22T13\:45","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"793244","title"\:"A (deep) dive into (shallow) immutability\: Valhalla and beyond","description"\:"Immutability is getting more and more attention in modern programming, making code easier to reason about, safer in concurrent environments, and more maintainable. However, adopting immutability isn’t without challenges, as it does improve the developer experience, but can often come with runtime costs. In Kotlin, immutability is already a key part of the language design, but there’s significant potential to push its boundaries even further.\\r\\n\\r\\nThis talk begins by exploring the current state of immutability in Kotlin. We’ll highlight what features the language already provides, examine what’s missing, and discuss the reasons behind these design decisions. From there, we’ll take a closer look at Project Valhalla, an upcoming JVM initiative that introduces value types and other innovations, enabling new possibilities for Kotlin. We’ll discuss how Valhalla can help enhance Kotlin’s immutability story and improve the programming experience without significant trade-offs.\\r\\n\\r\\nFinally, we’ll explore the broader immutability design space for Kotlin, looking beyond Valhalla to imagine what future extensions could look like. We’ll discuss how new immutability features could integrate with existing ones, such as smart casts and coroutines, while maintaining the language’s pragmatic and developer-friendly nature.\\r\\n\\r\\nJoin this session to discover how Kotlin can evolve its immutability story to better meet the needs of modern developers, combining practicality with innovation.","speakerIds"\:["bcd9e706-e7d2-4033-96e3-c8316a5a52ea"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T13\:00","endsAt"\:"2025-05-22T13\:45","tags"\:["Regular session","Intermediate","Language and best practices","Other"]},{"id"\:"779171","title"\:"APIs\: How Hard Can They Be?","description"\:"Virtually every Android developer uses AndroidX libraries. With KMP, the usage is expanding to other platforms as well. The wide adoption makes API design and evolution of these libraries critical for the user experience. Join me to learn about the life of an API in AndroidX\: from an idea, to a design, to a review, and through an API evolution. You will hear about our API review process and our use of Metalava and Kotlin Binary Compatibility Verification tools  to wrangle JVM, Android, and KMP libraries.","speakerIds"\:["8e2c2869-4beb-4868-8651-8567219ea947","288a938a-17ab-49cb-918a-65f2498a3d2f"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T13\:00","endsAt"\:"2025-05-22T13\:45","tags"\:["Regular session","Introductory and overview","Android","Extensibility/Tooling","Language and best practices"]},{"id"\:"793302","title"\:"One Codebase, Three Platforms\: X's Experience with Kotlin Multiplatform","description"\:"What if you could share a single codebase across Android, iOS, and Web without sacrificing platform-specific experiences? Is it even possible? At X (formerly Twitter), with a tiny developer team, we took the leap with Kotlin Multiplatform to entirely rebuild one of our core features for our multi-million-user platform.\\r\\n\\r\\nIn this talk, we'll take you through the highs and lows of adopting Kotlin Multiplatform in a real-world project. Learn about our development process, the libraries that made our journey smoother, and how we approached architecture, navigation, dependency injection, and UI for a consistent user experience across platforms.\\r\\n\\r\\nWe'll share practical lessons, the challenges we faced, and how Kotlin Multiplatform transformed our cross-platform development strategy. We'll also explore one of the biggest challenges\: gaining buy-in from iOS and Web developers for Kotlin Multiplatform. We'll share how we addressed their concerns and built strong collaboration across teams. Whether you're curious about Kotlin Multiplatform or seeking tips to enhance your implementation, this talk is for you\!\\r\\n\\r\\nJoin us to see how Kotlin Multiplatform enabled us to ship faster and deliver a seamless experience, even while tackling the complexities of building for millions of users with a small, focused team.","speakerIds"\:["7893992d-c5e7-4bcf-8786-68f753ef1404","ca470696-714f-479a-a230-476cd4a411e7"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T13\:00","endsAt"\:"2025-05-22T13\:15","tags"\:["Lightning talk","Intermediate","Multiplatform"]},{"id"\:"796310","title"\:"Two Years with Kotlin Multiplatform\: From Zero to 55% Shared Code","description"\:"Two years ago, StoneCo, one of the largest fintech companies in Latin America serving more than 4 million users, embarked on a journey to unify its mobile apps using Kotlin Multiplatform (KMP), aiming to balance the efficiency of code sharing with the seamless user experience required in the fintech sector. This talk explores our journey - how we evaluated multiple cross-platform frameworks, overcame technical and organizational challenges, and achieved 55% code sharing across two large-scale mobile applications.\\r\\n\\r\\nYou'll hear how we made the decision to adopt KMP, how we trained 130 mobile engineers to embrace this paradigm shift, and the measurable impact it has had on team productivity, developer satisfaction, and app performance. Whether you're considering KMP or scaling it in your organization, this session will provide actionable insights from a real-world, long-term implementation.","speakerIds"\:["c9cf4876-7b52-4bfa-9719-a473f3f5d27a"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T13\:30","endsAt"\:"2025-05-22T13\:45","tags"\:["Lightning talk","Introductory and overview","Multiplatform"]},{"id"\:"395a064d-104e-4a20-8250-37572d2d3be0","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T13\:45","endsAt"\:"2025-05-22T14\:00","tags"\:[]},{"id"\:"800297","title"\:"Compose Multiplatform","description"\:"The journey continues\! In this session, we'll look at recent changes and additions to Compose Multiplatform, and see how it continues to enable you to build gorgeous user interfaces for your multiplatform applications. You'll see firsthand what changes we're bringing to Compose Multiplatform, and how we continue to make it easier to build applications that look and feel great for your users, wherever they are.","speakerIds"\:["a82c6942-6e2b-4d80-9883-0b84b932d6ef"],"location"\:"Hall D3","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:45","tags"\:["Regular session","Introductory and overview","Multiplatform"]},{"id"\:"774874","title"\:"Extending Ktor for Server Side Development","description"\:"While Kotlin is seeing widespread adoption for Server side development, Ktor, Kotlin's minimalistic and flexible framework for server and client side development, is sometimes overlooked, largely because Spring Boot still offers an exhaustive range of starters. \\r\\n\\r\\nTo bridge this gap, kotlin developers can utilise Ktor's fluent Plugin API to provide all the functionality they need for their own use cases, and those of the wider community.\\r\\n\\r\\nIn this session, we will discuss developing plugins for Ktor and demonstrate a few interesting plugins that complement the standard set of Ktor’s features.\\r\\n\\r\\nYou’ll learn how to seamlessly integrate essential functionalities like Kafka for message-driven architectures, implement advanced rate limiting for traffic control, and enhance system resilience with a sophisticated Circuit Breaker plugin. Each plugin is crafted to offer flexibility and ease of integration, making your development experience smoother and more efficient.","speakerIds"\:["19ba798b-c32b-49eb-9c12-03925a14d852"],"location"\:"Hall D2","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:45","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"795195","title"\:"IoT development with Kotlin","description"\:"With the advent of Kotlin Multiplatform and Kotlin/Native, combined with IoT devices increasingly leveraging more powerful hardware capable of running Linux, we now have the exciting opportunity to use Kotlin for IoT development.\\r\\n\\r\\nThis talk will explore the key technologies required for IoT devices and demonstrate how to integrate them using Kotlin. From communication protocols like Matter, MQTT, and Bluetooth LE, to essential tools and frameworks like embedded Linux, D-Bus, and Buildroot, we will delve into the strategies and best practices for successfully adopting Kotlin in IoT development.","speakerIds"\:["79823093-1b16-4a2b-b0a9-ea4cd25b92f5"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:45","tags"\:["Regular session","Intermediate","Server-side","Multiplatform","Extensibility/Tooling","Other"]},{"id"\:"816767","title"\:"Good Old Data","description"\:"I will be talking about data-oriented systems design\: why we need to stop hiding plain data and why object orientation no longer serves us well. Starting from first principles and foundational definitions, we’ll explore practical recipes and patterns for working with data in Kotlin. Topics include serialization, persistent data structures, polymorphism, identity, and state","speakerIds"\:["9f7c3264-e8df-4f03-aec6-a75f4abfef19"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:45","tags"\:["Regular session","Intermediate","Language and best practices"]},{"id"\:"897873","title"\:"Get Started With Kotlin Multiplatform for Shared Business Logic","description"\:"Kotlin Multiplatform (KMP) allows you to write code once and share it across multiple target platforms, such as Android, iOS, web, and JVM. By leveraging KMP, you can minimize code duplication, maintain consistency, and significantly reduce development time and effort. In this Codelab, we will walk developers through taking a standalone Android app and a standalone iOS app, extracting some business logic to a KMP Shared Module, and leveraging this shared business logic from both Android and iOS.","speakerIds"\:["6add1648-b639-4177-8da5-c31de8537809","6b8c2666-a975-4a5f-9ee0-5f28f3e445ee"],"location"\:"Room \#173","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:45","tags"\:["Codelab","Introductory and overview"]},{"id"\:"779829","title"\:"The wonders of smart casting","description"\:"Smart casting sets Kotlin apart from other languages. We often see its effect through null checks and when expressions, but in this talk we'll show that smart casting is capable of much more\! ","speakerIds"\:["94fc2fde-5e41-4ea6-a223-cd61141397f9"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T14\:00","endsAt"\:"2025-05-22T14\:15","tags"\:["Lightning talk","Intermediate","Language and best practices"]},{"id"\:"811910","title"\:"The place where leaking abstraction, data races and security vulnerabilities are all met","description"\:"Working with files and directories is such a ubiquitous task, we're all doing it every day whether we want it or not. After filesystems introduction, more than 60 years ago, multitude of libraries and APIs were introduced, and by the 2025 the problem of interaction with file systems from your program should be finally solved. But is it though?\\r\\n\\r\\nIn my talk, I'll open a Pandora's box of leaking abstractions, data races and security vulnerabilities for you, and we'll see whether  \\"there's a library from 80s doing that\!\\" means the problem is solved, or it is an invitation to innovate.","speakerIds"\:["2a91775b-ce06-49d2-b1f9-e7e0816cf1f2"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T14\:30","endsAt"\:"2025-05-22T14\:45","tags"\:["Lightning talk","Introductory and overview","Multiplatform","Other"]},{"id"\:"49a73707-3245-46b9-89c3-b99e3d660033","title"\:"Coffee Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T14\:45","endsAt"\:"2025-05-22T15\:15","tags"\:[]},{"id"\:"794336","title"\:"Blueprints for Scale\: What AWS Learned Building a Massive Multiplatform Project","description"\:"The AWS SDK for Kotlin is a massive multiplatform project, spanning over 300 services and targeting 8 distinct platforms.\\r\\n\\r\\nIn this session, we’ll share first-hand insights into managing the challenges of a large Kotlin Multiplatform project, detailing how the AWS SDK for Kotlin was designed, developed, and scaled. You’ll hear about the best practices we adopted, the lessons learned, and the strategies that worked (and didn’t) at AWS scale.\\r\\n\\r\\nJoin us as we discuss design tradeoffs, maintaining backwards compatibility, adding support for Kotlin Multiplatform, automating build and release processes, and more\!","speakerIds"\:["2c45e37f-406f-4d22-ba3c-92c679f10158","9f2b5627-1d42-423f-a6e9-f5e5e356edee"],"location"\:"Hall D3","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T16\:00","tags"\:["Regular session","Intermediate","Multiplatform","Language and best practices"]},{"id"\:"795897","title"\:"Building Inclusive Jetpack Compose Apps\: Leveraging Kotlin and the Accessibility Scanner","description"\:"Accessibility is a growing and important aspect in app development that isn’t always prioritized. Google’s efforts include making apps more accessible which are shown in their new standard of making UIs, using Jetpack Compose. Jetpack Compose with its Kotlin-based declarative approach offers a simplified path to building inclusive UIs. Within Jetpack Compose, there are powerful tools like the Accessibility Scanner to quickly identify and address common accessibility issues, improving the overall user experience. This talk will show that straightforward changes yield dramatic improvements for user experience. Through the talk, strategies will be shown how to improve accessibility. ","speakerIds"\:["f5ae677d-785e-4af9-a746-3fcca5a351fe"],"location"\:"Hall D2","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T16\:00","tags"\:["Regular session","Intermediate","Android"]},{"id"\:"794830","title"\:"Exposed\: Stable, Scalable, and Looking Forward","description"\:"Exposed is a database access library that provides a type-safe SQL DSL, a powerful ORM, and reliable database interactions as a seamless extension of any Kotlin developer’s code.\\r\\n\\r\\nThe team behind the library has been working towards its first stable version, and this talk aims to provide a detailed insight into what stability will mean for the library, as well as the enhanced features that will come with it.\\r\\n\\r\\nWe’ll also cover the introduction of support for database migrations and for non-blocking database operations using R2DBC with Kotlin coroutines, as well as the challenges encountered during their development. In addition, we’ll explore tooling support options via the IntelliJ IDEA plugin, namely table object and entity class generation.\\r\\n\\r\\nLastly, to share a look into the future of Exposed, we’ll touch on planned features for later stable versions that address the library’s position as a database access solution in Kotlin multiplatform development.","speakerIds"\:["aa4f4219-1d5a-4d23-bcb3-42284ff37fb0"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T16\:00","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"783886","title"\:"Introducing Compose Hot Reload","description"\:"Compose Hot Reload is a new plugin for Compose apps running on the JVM, which lets you see the results of your code changes live, without having to restart the app.\\r\\n\\r\\nIn this talk, we'll look at where Compose Hot Reload is today and how you can use it in your projects to make iterating on UI code faster, more convenient, and more exciting\!\\r\\n\\r\\nThen we'll dive into the technical details to see how multiple JetBrains technologies came together, step by step, lifting a modern UI framework to the next level. We'll also learn about all the fun issues encountered and decisions that had to be made along the way.","speakerIds"\:["2060faa7-dbea-41e1-ba1e-107b58b960a2"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T16\:00","tags"\:["Regular session","Intermediate","Multiplatform","Extensibility/Tooling"]},{"id"\:"793235","title"\:"Coroutine Debugging in IntelliJ IDEA","description"\:"During the past 1.5 years, we’ve implemented the smooth coroutine debugging experience, so it would feel almost the same as debugging synchronous code and even better\! In this talk I will show you the capabilities of coroutine debugger and best practices for debugging coroutines. Also, I’ll tell you a little bit about the challenges we faced while implementing these improvements, such as deep integration and communication between the IDE and the coroutine library.","speakerIds"\:["51477c3e-3876-4abc-b05f-36658f054d28"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T15\:30","tags"\:["Lightning talk","Intermediate","Extensibility/Tooling"]},{"id"\:"796118","title"\:"How to Build Your Own Kotlin Course","description"\:"Interested in teaching Kotlin? This session introduces a comprehensive set of materials designed to help you build your own Kotlin course. These resources include presentations with speaker notes, theory quizzes, homework assignments, and interactive in-IDE courses that give students hands-on experience. We will also share insights from implementing these materials at two universities, and show how they can be adapted for different audience levels.","speakerIds"\:["bc1d17b4-0e64-41ea-8d20-1f52002d339b","2d45da37-3453-4fad-aa68-1f461f08858d"],"location"\:"Room \#173","startsAt"\:"2025-05-22T15\:15","endsAt"\:"2025-05-22T16\:00","tags"\:["Education","Introductory and overview","Language and best practices","Other"]},{"id"\:"885501","title"\:"Coroutines and Structured Concurrency in Ktor","description"\:"Ktor is built from the ground up using Kotlin and Coroutines. It allows us to leverage Structured Concurrency, and easily build elegant and robust applications.\\r\\n\\r\\nDiscover how Coroutines and CoroutineScopes work in Ktor from the ground up, and what patterns and best practices allow building safe -and maintainable applications with Ktor in Kotlin.","speakerIds"\:["ea32e9a2-b68e-44c5-b4b7-6d2aa0dc3141"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T15\:45","endsAt"\:"2025-05-22T16\:00","tags"\:["Lightning talk","Intermediate","Server-side","Language and best practices"]},{"id"\:"25c3ecea-56fa-400e-b712-021935710e13","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T16\:00","endsAt"\:"2025-05-22T16\:15","tags"\:[]},{"id"\:"793709","title"\:"Full Stream Ahead\: Breaking the protocol barrier with http4k","description"\:"HTTP's request-response pattern has served us well, but modern web applications demand more. Real-time communication demands different protocols, yet maintaining testability and simplicity remains crucial to developer experience.\\r\\n\\r\\nIn this talk, we'll explore how http4k extends HTTP's capabilities through WebSocket and Server-Sent Events support and how these protocols can be modelled as simple functions, making them as testable as plain HTTP endpoints. We'll then show how these streaming capabilities open up new possibilities for server-side rendering, bringing us full circle from the days of JSP to modern reactive interfaces - all while keeping the complexity on the server where it belongs.\\r\\n\\r\\nJoin us to discover how http4k's streaming capabilities can enhance your web applications, enabling everything from chat applications to live dashboards and reactive server-rendered interfaces.","speakerIds"\:["ec0fee0b-5c8e-4a68-9828-434051c9dbc5"],"location"\:"Hall D3","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T17\:00","tags"\:["Regular session","Intermediate","Server-side","Other"]},{"id"\:"795839","title"\:"Multiplatform Settings\: A case study in Multiplatform library development","description"\:"How do I create libraries for Kotlin Multiplatform projects? Kotlin lets you share common code between different target platforms, but by default only a limit set of platform-agnostic APIs are available to the code. Growing the amount of APIs available required Kotlin Multiplatform libraries.\\r\\n\\r\\nI’ll talk through what it looks like to create such a library, drawing from my experience building and maintaining one of my own since the early days of Kotlin/Native. We'll talk about how to find shared abstractions around different platform APIs, how to handle the fast-paced evolution of this environment, and what this all felt like as a first-time library developer. When we're done, you’ll be ready to leverage the growing ecosystem as well as make your own contributions.","speakerIds"\:["7a1d47f2-dfd1-4af1-b097-5c415f9b29c3"],"location"\:"Hall D2","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T17\:00","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"800068","title"\:"Compose draw speedrun - reloaded","description"\:"Let's see how many compose drawing techniques we can demo in 45 minutes. This live code speed run will start simple and quickly escalate. I will try out as many drawing techniques as will fit into the time and screen space in a compose desktop app. Thanks to hot reloading we will be able to see the effects as the code changes.\\r\\n\\r\\nAt the end of this talk the audience will\:\\r\\n\\r\\n- have a good overview of what is possible with compose drawing\\r\\n- see hot reload in action\\r\\n- get access to the open source repo of samples as a reference","speakerIds"\:["2313d8eb-7d6e-444d-8e8d-4d223f896ce8"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T17\:00","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"795976","title"\:"LangChain4j with Quarkus","description"\:"Kotlin is loved for its expressiveness, Quarkus for its blazing-fast runtime, and LangChain4j for integrating AI into modern applications. But what happens when you bring all three together? You unlock the potential to build cutting-edge, AI-powered applications efficiently.\\r\\n\\r\\nDespite the growing demand for AI-driven solutions, integrating AI workflows into existing applications remains a challenge for many Kotlin developers. Pain points include complex setup, lack of synergy between frameworks, and maintaining high performance while leveraging AI tools.\\r\\n\\r\\nThis talk offers a solution\: combining LangChain4j and Quarkus to create Kotlin applications that leverage AI capabilities seamlessly. We’ll explore how to streamline integration, manage dependencies, and use Kotlin’s idiomatic features to simplify AI workflows.\\r\\n\\r\\nWho is this talk for? Kotlin developers curious about embedding AI into their apps, and Quarkus fans eager to explore its potential in AI-driven use cases. Attendees will leave with actionable insights, including code samples, to build AI-powered applications confidently.","speakerIds"\:["a72ff8a0-1557-4a92-8730-604bb0665dad","e55a14fb-581e-456f-b87b-9b388ca21298"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T17\:00","tags"\:["Regular session","Introductory and overview","Server-side","Language and best practices","Other"]},{"id"\:"799572","title"\:"Interactive Session on Shaping Kotlin Education","description"\:"Kotlin is a popular choice for teaching programming, and the Kotlin Foundation Education Committee is here to support educators in using it to its full potential.\\r\\n\\r\\nIn this session, we’ll share current initiatives for those teaching and learning Kotlin – whether in classrooms, workshops, or teams. You’ll learn how to get involved, access available resources, and connect with others in the teaching community.\\r\\nJoin us for an interactive format featuring educators, experts, and members of the Kotlin Foundation Education Committee. Together, we’ll explore how we can better support your work, address common challenges, and discuss what we should prioritize next.\\r\\n\\r\\nBring your questions\!","speakerIds"\:["d100c85b-9098-4413-a78d-5edd0f86f3a3","6add1648-b639-4177-8da5-c31de8537809"],"location"\:"Room \#173","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T17\:00","tags"\:["Education","Introductory and overview","Language and best practices","Other"]},{"id"\:"812314","title"\:"Kotlin compatibility crash course","description"\:"A new version of Kotlin is out 🎉 Let's update all the things 🚀 \\r\\nBut... what does it really mean to update your Kotlin version?\\r\\n\\r\\nIn this talk, we'll take a look at different parts of the Kotlin ecosystem\: Kotlin stdlib, Gradle Plugin, compiler, K/N, JS, etc... and the different compatibility guarantees they offer. \\r\\n\\r\\nWe'll dive into Android and Java. They have compatibility guarantees too\!\\r\\n\\r\\nWhether you're developing an Android app, a server, a library or a Gradle plugin, we'll see how you can use the latest tooling while still giving your users plenty of time to update on their own schedule. \\r\\nAfter this talk, you'll never be afraid to see \\"incompatible version of metadata\\" in your logs anymore\!","speakerIds"\:["56fda597-4927-4d25-9a80-4795d15ef080"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T16\:15","endsAt"\:"2025-05-22T16\:30","tags"\:["Lightning talk","Intermediate","Extensibility/Tooling"]},{"id"\:"812209","title"\:"Kotlin Worst Practices — How to Maximize Your Hassle","description"\:"Want to turn your Kotlin journey into a rollercoaster of frustration? You’re in the right place\! In this session, we’ll uncover the ultimate strategies for making life harder\: delightfully obtuse anti-patterns, enthusiastically misusing language features, and blissfully ignoring ecosystem best practices.\\r\\n\\r\\nPacked with real-world blunders, this talk is your shortcut to chaos\!","speakerIds"\:["6c7be28a-5b66-4646-8bcd-b534c67ee6e8"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-22T16\:45","endsAt"\:"2025-05-22T17\:00","tags"\:["Lightning talk","Intermediate","Language and best practices"]},{"id"\:"91551b5d-e7af-49c7-8107-2d5331056f25","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T17\:00","endsAt"\:"2025-05-22T17\:15","tags"\:[]},{"id"\:"796169","title"\:"That's Unpossible – A full stack side project webapp (including a high-fidelity UI\!) all in Kotlin","description"\:"It's happened to all of us – an idea strikes for a side project and you want to build a quick webapp, but then you remember the state of webdev is still a bit of a mess in 2025. Sure you could pick up one of those \\"all-in-one\\" frameworks, but they're so heavy and complicated. And even if that worked, you'd still need something on the frontend so you start looking at the the weird world of frontend frameworks or (gasp\!) writing raw HTML/CSS/JavaScript.\\r\\n\\r\\nBut it doesn't have to be that hard\! I'm here to present a straightforward stack that gets you a full stack webapp up and running fast, using the one language we all know and love – Kotlin. Database manipulation, async services, and a high fidelity UI, all accessed and built with Kotlin. And yes, you read that right – you can have a great UI without having to write a single line of CSS, HTML, or JavaScript.\\r\\n\\r\\nI'll show you a path for building a basic webapp on top of a simple database (Postgres), performing basic CRUD operations on that database (Kotlin Exposed), building business logic via async services (Kotlin Coroutines), and constructing a high-fidelity UI to bring it all together (Vaadin on Kotlin). By the end of the talk we'll have a fully functional webapp that is entirely built on Kotlin.\\r\\n\\r\\nAnd let's not forget, we're not building a by-the-book, very serious webapp, just something we're doing on the side for fun. So forget about tests and forget about perfect architecture – let's have some fun, learn a few things along the way, and get this thing running\!","speakerIds"\:["31fc1d3d-dfe1-40bd-85a1-0ed9cac82dfa"],"location"\:"Hall D3","startsAt"\:"2025-05-22T17\:15","endsAt"\:"2025-05-22T18\:00","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"779345","title"\:"Build your own NES Emulator... with Kotlin","description"\:"Let Fools Dream\\r\\n\\r\\nFor those who have ever wanted to recreate classic games, this presentation covers my five-year journey to build a NES emulator in Kotlin. Starting from scratch in 2020 (you can probably guess why), I’ll share the challenges posed by the architecture of old hardware, performance optimization (surprise, surprise), and the difficulties of emulating sound. I’ll also highlight which Kotlin features shine (and why concurrency isn’t one of them). This high-level overview will walk through each step of the process—from reading ROM formats to where GPT can help, though it won’t write the code for us just yet. We’ll wrap up by launching Mario on the emulator (hopefully without a call from Nintendo).","speakerIds"\:["9f61391f-818f-4b9f-86a2-2fca5fd9a4d7"],"location"\:"Hall D2","startsAt"\:"2025-05-22T17\:15","endsAt"\:"2025-05-22T18\:00","tags"\:["Regular session","Intermediate","Other"]},{"id"\:"858141","title"\:"Making native SDKs Multiplatform at RevenueCat","description"\:"In the rapidly evolving Kotlin Multiplatform ecosystem a critical gap has been the lack of a unified in-app purchase and subscription solution. Until now, that is. The RevenueCat SDK for Kotlin Multiplatform allows you to write your subscription code once and run it on both Android and iOS. But how did we build it? We have existing native SDKs for both Android and iOS, and did not want to rewrite all core logic. This talk will cover the strategies, pitfalls and learnings of our approach to bringing native SDKs to Kotlin Multiplatform.\\r\\n\\r\\n","speakerIds"\:["72b17129-a810-480a-a9a2-db81c54cfc6d"],"location"\:"Auditorium 15","startsAt"\:"2025-05-22T17\:15","endsAt"\:"2025-05-22T18\:00","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"781372","title"\:"Writing Your Third Kotlin Compiler Plugin","description"\:"Compiler plugins have become an integral part of a developer’s experience with the Kotlin programming language. Areas like UI development (Jetpack Compose), backend development (Spring Boot / Kotlin Serialization), and even testing (Power-Assert) all leverage compiler plugins. But what is a Kotlin compiler plugin and what can it do? Let’s learn by writing one\!\\r\\n\\r\\nIn this talk, we’ll discuss use cases for compiler plugins and learn how they integrate with the Kotlin compiler. Then we’ll explore everything related to how code is represented within the Kotlin compiler, including how to inspect, navigate, transform, and create these representations. When we’re done, we’ll have written a compiler plugin from scratch which can navigate the project code, inspect annotations, generate boilerplate, and even report errors\!","speakerIds"\:["63733e27-0704-401e-a342-8173a51b83c9"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-22T17\:15","endsAt"\:"2025-05-22T18\:00","tags"\:["Regular session","Advanced","Extensibility/Tooling"]},{"id"\:"62b7f3ff-2afa-4b2e-8aec-e69e536cdb6a","title"\:"Party","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-22T18\:00","endsAt"\:"2025-05-22T22\:00","tags"\:[]},{"id"\:"9f8b2bc4-a9f2-40f0-9b90-1604a452a8f7","title"\:"Registration","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T08\:00","endsAt"\:"2025-05-23T09\:00","tags"\:[]},{"id"\:"797367","title"\:"Qualities of a Well-Functioning System","description"\:"“We can't impose our will on a system. We can listen to what the system tells us, and discover how its properties and our values can work together to bring forth something much better than could ever be produced by our will alone.” -- Donella Meadows\\r\\n\\r\\nRelational complexity in software is constantly increasing. Data pipelines become a mesh. A monoliths becomes microservices. Synchronous database transactions become event-driven architectures. Infrastructure becomes DevOps. Software is becoming systems of software.\\r\\n\\r\\nAs technology professionals, we are trapped between the desire for control and the reality of systems. Increasingly, we act amidst ambiguity and uncertainty. We diversify and expand our skillset.  Systems challenge our thinking patterns and core mental models. \\r\\n\\r\\nFortunately, there are some core principles for designing healthy systems. I don't mean (strictly) scalability or microservices. Three qualities are inherent in well-functioning systems\: resilience, self-organization and hierarchy. \\r\\n\\r\\nEach of the qualities, guaranteed, differ from your current definition. In this keynote, we will explore them from a systems point of view.","speakerIds"\:["ffc04f2e-579f-4653-8dad-5779557fd386"],"location"\:"Hall D3","startsAt"\:"2025-05-23T09\:00","endsAt"\:"2025-05-23T10\:00","tags"\:["Regular session","Introductory and overview","Other"]},{"id"\:"9bf5cefe-6056-4976-84b6-33adc784452f","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T10\:00","endsAt"\:"2025-05-23T10\:15","tags"\:[]},{"id"\:"795941","title"\:"Dissecting Kotlin\: Surveying the Latest Stable and Experimental","description"\:"As Kotlin evolves, not only do the features available to us as developers evolve, but so does our understanding of what idiomatic Kotlin is, how we can best leverage new and old features and the semantic and performance impacts of our implementation choices.\\r\\n\\r\\nIn this session, we will examine some of the features released over the last couple of years in Kotlin, dive into their implementations, explore where we may need them and how we might use them, and discuss how these features fit into the broader ideas and themes of Kotlin as a language.","speakerIds"\:["2d41d3fb-3321-4b47-a401-ae84a5de2423"],"location"\:"Hall D3","startsAt"\:"2025-05-23T10\:15","endsAt"\:"2025-05-23T11\:00","tags"\:["Regular session","Intermediate","Language and best practices"]},{"id"\:"795620","title"\:"Dependencies and Kotlin/Native","description"\:"In the JVM world, the virtual machine and its class loaders do the heavy lifting of linking and loading our applications with dependencies. When we use Kotlin Multiplatform to produce a native binary, we lose the simplicity of JAR archives and .class files.\\r\\n\\r\\nIn this session, we'll explore the differences between how JVM and native platforms handle dependencies. We'll look at some of the common blockers that native platforms throw our way and possible workarounds. We'll also compare dependency management tools used on Apple platforms like CocoaPods and Swift Package Manager to see their strengths and weaknesses.\\r\\n\\r\\nLearn how native dependencies interact, how they are loaded and the unexpected complexities of the native world.","speakerIds"\:["969813cd-0231-4310-9c61-745967bd94c5"],"location"\:"Hall D2","startsAt"\:"2025-05-23T10\:15","endsAt"\:"2025-05-23T11\:00","tags"\:["Regular session","Intermediate","Multiplatform","Extensibility/Tooling"]},{"id"\:"788999","title"\:"Collect Like a Pro\: a deep dive on the Android lifecycle-aware coroutines APIs","description"\:"Collecting in a lifecycle-aware manner is essential for saving system resources. Since coroutines and flows are the recommended solution for asynchronous programming on Android, there are APIs that do most of the heavy-lifting work for you. Namely\: repeatOnLifecycle, flowWithLifecycle, and Compose’s collectAsStateWithLifecycle. When building for Android, you should include these libraries in your toolbox. But even if you’re doing KMP, you should keep this in mind.\\r\\n\\r\\nIn this talk, we’ll see the different lifecycle-aware coroutines APIs, the problems they solve, and which types of flows can make your system waste resources—Disclaimer\! A cold flow backed by a Channel or Flow operators with buffers might be under investigation. Prepare to roll up your sleeves as we dissect their implementation details and learn low-level coroutines and Compose APIs. But the journey doesn't end there\! To help you think as a library developer, we’ll explore an API regret that never made it into stable to protect developers from misusing the API and force them respect coroutines’ structure concurrency.\\r\\n\\r\\nBy the end of the talk, you'll understand the importance of collecting in a lifecycle-aware manner, use low-level coroutines APIs to build your own APIs, and design APIs that respect structure concurrency and protect your users from misuse.","speakerIds"\:["b4cf78c9-623b-4b8f-b676-097fb7802668"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T10\:15","endsAt"\:"2025-05-23T11\:00","tags"\:["Regular session","Intermediate","Android"]},{"id"\:"799261","title"\:"Taming Asynchronous Beasts\: Debugging and Performance Tuning in a Coroutine World","description"\:"Asynchronous code can be challenging to debug and optimize, especially when dealing with complex coroutine hierarchies and flow transformations. This session reveals practical techniques for tracking down elusive bugs, optimizing performance, and maintaining reliability in coroutine-heavy applications.\\r\\n\\r\\nDrawing from real production experience, we'll explore advanced debugging techniques, common performance pitfalls, and practical solutions for the most challenging scenarios. You'll learn how to effectively use built-in tools, recognize problematic patterns, and implement proven optimization strategies.","speakerIds"\:["471696d0-3659-4bc2-bce4-878deb782d3a"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T10\:15","endsAt"\:"2025-05-23T11\:00","tags"\:["Regular session","Advanced","Server-side"]},{"id"\:"779451","title"\:"Leveraging KMP for navigation in the McDonalds App.","description"\:"KMP is well known as THE domain layer framework for Android and iOS. But why not take it further\! In our pursuit to create the slimmest possible android and iOS apps, where KMP handles everything except the UI. Our next step is taking control of the navigation system. But Handling android and iOS navigation from a cross platform environment is not easy. In this talk we tell you how it is done, what challenges we overcame and where we are now.\!","speakerIds"\:["5985cca0-e053-46cf-9002-48bded9a43e3","6533a51a-e3b3-4b27-8ba7-54a7cf73f728"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T10\:15","endsAt"\:"2025-05-23T10\:30","tags"\:["Lightning talk","Intermediate","Multiplatform"]},{"id"\:"759131","title"\:"Kotlin Multiplatform's Cross-Platform Brilliance at Norway's 377-Year-Old National Postal Service","description"\:"Do you have a complex business rule-set problem? You know the kind where you have business rules (logic) spread across multiple platforms, systems and applications? Some of them might even be alter egos of the same rule hiding in different apps. You never know which one might turn up where, there is no single source of truth, solving errors takes hours of debugging, and making changes requires (oftentimes) painful coordination across teams and applications (ugh).\\r\\n\\r\\nWe faced this exact challenge at Posten Bring As - Norwegian National Postal Service founded way back in 1647 - a 377-year-old institution with software spanning more generations than most families\! Our business logic was scattered across multiple platforms, some almost as old as the company itself (well, not quite, but it sure felt like it).\\r\\n\\r\\nIn my session I’m spilling the tea. We discover how the team at century-old Norwegian postal services giant tackled modern challenges with cutting-edge technology.\\r\\n\\r\\nWe’ll look through real-world use cases at Posten Bring. We’ll reflect on what we did - key learnings, what went well and most importantly - what didn’t quite go as planned. We’ll also look through some resources to get started. We'll learn how KMP provides a unified framework for code sharing and execution across various platforms to solve the challenge of different codebases targeting different runtimes.\\r\\n\\r\\nThis talk is for you if troublesome and unruly business logic keeps you up at night and you want that to end NOW. It is also for you if you like to hear a good story.","speakerIds"\:["38540b03-51ad-4fb1-8bf6-371e814ee221"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T10\:45","endsAt"\:"2025-05-23T11\:00","tags"\:["Lightning talk","Introductory and overview","Server-side","Multiplatform","Language and best practices","Other"]},{"id"\:"bf96cb3b-0c6d-4931-b955-7259e9ffe297","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T11\:00","endsAt"\:"2025-05-23T11\:15","tags"\:[]},{"id"\:"788419","title"\:"Designing Kotlin Beyond Type-Inference","description"\:"Kotlin programmers regularly elide uninformative types from their programs. This makes Kotlin programs faster to develop, easier to read, and less effort to maintain. It also means the Kotlin language needs to be designed so that its compilers can reliably accept programs without these typing hints. We think of this as type-inference, but—by definition—type-inference means determining these missing types can be filled in such that the program type-checks.\\r\\n\\r\\nBut what if we can determine a program is safe without determining these missing types? What if we can do so even when it such types do not exist? And what if we can do so more efficiently than any type-inference algorithm can?\\r\\nIn researching Kotlin's next-generation typing algorithms, we have discovered we can efficiently exceed the capabilities of type-inference and type-checking. We have developed a type-\\"outference\\" algorithm that efficiently decides \\"type-consistency\\", which all type-inferable/checkable programs satisfy (but not vice versa).\\r\\n\\r\\nWhile type-inference still has its place in user feedback and compilation, type-consistency is a much more flexible property, and type-outference offers clear guidelines on how to design features for efficient validation. In this talk, after introducing these concepts, we will provide a behind-the-scenes look into how they guide the design of various expected and hypothetical features for Kotlin, such as union types for errors, conditional inheritance for type-safe equality with value types, and implicit polymorphism for non-escaping references.","speakerIds"\:["7b42f61c-5e49-45ac-96a7-5d6fb0391ebd"],"location"\:"Hall D3","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T12\:00","tags"\:["Regular session","Advanced","Language and best practices"]},{"id"\:"774286","title"\:"Build Websites in Kotlin & Compose HTML with Kobweb","description"\:"Want to build a website using Kotlin? Kobweb is a modern web framework that makes web development enjoyable by leveraging Compose HTML and drawing inspiration from Jetpack Compose.\\r\\nWith Kobweb, you can create a portfolio site, product landing page, personal blog, and more—all while benefiting from Kotlin’s concise, expressive, and type-safe syntax.\\r\\nIn this live coding session, we’ll introduce the fundamentals of Kobweb and Compose HTML, walking you through the process of building a functional website using Kotlin/JS. By the end, you’ll see just how easy it is to develop and export a traditional website—embracing HTML, CSS, and the DOM through a Kotlin-first, Compose-powered approach.\\r\\nThis talk is designed for beginners, and no prior web development experience is required.\\r\\nIf you’re curious about web development and want to explore a Kotlin-powered, type-safe, Compose API for building modern websites, this session is the perfect place to start\!","speakerIds"\:["02c37e8c-552f-4a24-b614-f68154b76d08"],"location"\:"Hall D2","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T12\:00","tags"\:["Regular session","Introductory and overview","Other"]},{"id"\:"812400","title"\:"Duolingo + KMP\: A Case Study in Developer Productivity","description"\:"Duolingo ships weekly on iOS and Android to 40M+ Daily Active Users across 176 countries. Shipping fast is important to us and Kotlin Multiplatform is starting to play a huge role in how we accomplish this\!\\r\\n\\r\\nIn this talk, we’ll\:\\r\\n- Discuss how we shipped Video Call, Math, Adventures and more across Android, iOS, and Web\\r\\n- Propose what potential upcoming projects could benefit from KMP and the rubric we use\\r\\n- Share the challenges faced and lessons learned along the way\\r\\n\\r\\n…and more\!","speakerIds"\:["903c7a65-63f0-4244-8f8c-7ab8f7acae75","050c397e-612e-4587-9057-abdb37000380"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T12\:00","tags"\:["Regular session","Intermediate","Multiplatform","Android"]},{"id"\:"856501","title"\:"Building AI Agents in Kotlin","description"\:"AI agents are fully autonomous systems whose actions are dynamically directed by LLMs. In agents, LLMs are not only used for standalone tasks while keeping the general flow predefined in the code — they become the main actor responsible for answering how a task should be accomplished.\\r\\n\\r\\nThis talk will provide an overview of AI agents, including their building blocks and basic workflows. It will share the essential knowledge for building effective AI agents in Kotlin, along with insights into how we built the Junie coding agent at JetBrains.","speakerIds"\:["0f769b19-d5f2-49fb-aa78-a086aa046b7e"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T12\:00","tags"\:["Regular session","Introductory and overview","Extensibility/Tooling"]},{"id"\:"897908","title"\:"Get Started With Kotlin Multiplatform for Shared Business Logic","description"\:"Kotlin Multiplatform (KMP) allows you to write code once and share it across multiple target platforms, such as Android, iOS, web, and JVM. By leveraging KMP, you can minimize code duplication, maintain consistency, and significantly reduce development time and effort. In this Codelab, we will walk developers through taking a standalone Android app and a standalone iOS app, extracting some business logic to a KMP Shared Module, and leveraging this shared business logic from both Android and iOS.","speakerIds"\:["6add1648-b639-4177-8da5-c31de8537809","6b8c2666-a975-4a5f-9ee0-5f28f3e445ee"],"location"\:"Room \#173","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T12\:00","tags"\:["Codelab","Introductory and overview"]},{"id"\:"795546","title"\:"Getting your Gradle setup right, at the right time","description"\:"Let’s address the elephant in the room - setting up a Gradle project in a proper scalable way is hard. What’s even more challenging is doing this once the project is already scaled and running. What’s nearly impossible is learning what “a good scalable setup” actually means on your own.\\r\\n\\r\\nSo what does a good scalable setup mean? Are the best practices universal for all types of project? Are there Kotlin specific best practices? When and how should you introduce them? Let’s dive in\!","speakerIds"\:["c3d67678-d92d-4ce2-89ee-c603ff06817a"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T11\:15","endsAt"\:"2025-05-23T11\:30","tags"\:["Lightning talk","Intermediate","Extensibility/Tooling"]},{"id"\:"857571","title"\:"Build your Kotlin and Android apps with Buck2","description"\:"We're happy to announce that Buck2, a large-scale open source build system from Meta, now supports Kotlin and Android. Buck2  builds all Android applications at Meta with a focus on fast incremental iterations with code. \\r\\nWe will start building an app from basics and then learn some advance buck2 capabilities, like Remote Execution, Source-only ABI, and Build Tools API integrations  ","speakerIds"\:["8466c9d8-0d23-41da-a283-80632a241057"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T11\:45","endsAt"\:"2025-05-23T12\:00","tags"\:["Lightning talk","Introductory and overview","Android"]},{"id"\:"d96209fe-ff29-4bc8-8895-390f64734dbf","title"\:"Lunch","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T12\:00","endsAt"\:"2025-05-23T13\:00","tags"\:[]},{"id"\:"811578","title"\:"The Easing Symphony\: AnimationSpec in detail\!","description"\:"Let's take a deeper look at AnimationSpec and learn how to use it to customize animations\! With music\!\\r\\n\\r\\nUsing Compose Multiplatform, we'll go over the different AnimationSpec types we have, and which personalization options they offer. We'll cover topics from how to use AnimationSpec, to how to create your own easing curves. And since animations are meant to be fun, we'll do all of this while creating a music visualizer\!\\r\\n\\r\\nAfter this talk, you'll have a better understanding on how powerful animationSpec is, and how you can use it to create complex and fun animations.\\r\\n\\r\\nKeep it fun, keep it animated\! \:)\\r\\n","speakerIds"\:["94ba4fa4-aed7-482e-8096-f61090d5bb4d"],"location"\:"Hall D3","startsAt"\:"2025-05-23T13\:00","endsAt"\:"2025-05-23T13\:45","tags"\:["Regular session","Introductory and overview","Multiplatform","Android","Other"]},{"id"\:"795023","title"\:"Project Sparkles\: How Compose for Desktop is changing Android Studio and IntelliJ","description"\:"Many of us use Android Studio and IntelliJ every day, and appreciate how its rich feature set makes our job easier. Most people know that both products are built on the IntelliJ Platform, the same that underpins the popular IDEs from JetBrains, which has seen lasting success for over 20 years. It’s a solid, expansive, and by far the best foundation on which we could stand on to deliver developer goodies.\\r\\n\\r\\nHowever, some parts of the IntelliJ Platform show the signs of time; in particular its UI framework, Swing, is proving the most limiting, having been around for almost 30 years. Don’t get us wrong — it works, and the IDEs themselves prove you can ship complex UIs by using Swing on the IntelliJ Platform. But as we looked at how nice it is to develop UIs on desktop by using Compose for Desktop, we thought\: why don’t we do the same?\\r\\n\\r\\nEnter Project Sparkles, which aims at gradually introducing new high-quality, polished UI surfaces in Android Studio and IntelliJ, developed in Compose for Desktop, with all the bells and whistles you can expect from a top-tier interface. In this talk, we’ll cover how Project Sparkles is impacting the development of Android Studio and IntelliJ, addressing long-standing user feedback, and how Google and JetBrains are working together to build a framework to make your favorite IDE even better and easier to understand.\\r\\n\\r\\nWe’ll demonstrate a few examples of features already shipping that are powered by Project Sparkles, explain what our goals and ambitions are, and even show some sneak peeks of things you may see in a future IDE version. We will also cover a roadmap on when developers can expect to use Compose for Desktop as a supported UI framework for IntelliJ plugin development\!\\r\\n\\r\\nUI enthusiasts, assemble\!","speakerIds"\:["eb4483f1-306b-447d-9888-648ec0fc0018","e397fee8-078f-4694-8a1f-35b1d57f1fce"],"location"\:"Hall D2","startsAt"\:"2025-05-23T13\:00","endsAt"\:"2025-05-23T13\:45","tags"\:["Regular session","Introductory and overview","Multiplatform","Extensibility/Tooling"]},{"id"\:"787545","title"\:"Don't forget your values\!","description"\:"No one likes to be forgotten, and the results of most non-unit function calls are no exception here. 'Check return value' or 'ignored call result' may sound familiar — those are popular Java linters' rules. However, in our view, this inspection is so crucial that it deserves its place among compiler diagnostics. In this talk, we'll explore the challenges and complexities down the road of making a brand-new language feature. And, of course, how you can use it for your benefit.","speakerIds"\:["7c29bd1a-00bd-4349-b3e8-92c47710a011"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T13\:00","endsAt"\:"2025-05-23T13\:45","tags"\:["Regular session","Intermediate","Extensibility/Tooling","Language and best practices"]},{"id"\:"795778","title"\:"Event-Driven Analytics\: Building Real-Time Dashboards with Apache Flink and Ktor","description"\:"The ability to process continuous data streams and deliver real-time insights has become crucial in modern application architectures. As a developer you are probably very comfortable with RESTful services, and shifting to event-driven thinking opens new possibilities for responsiveness and scalability (as well as new challenges and growing paints).\\r\\n\\r\\nThis talk will explore building real-time analytics dashboards by combining Apache Flink's powerful stream processing capabilities with Ktor's flexible web framework. We'll journey through the mental model transformation from request/response patterns to continuous event flows, demonstrating how this shift enables truly reactive applications.\\r\\n\\r\\nYou'll learn\:\\r\\n* How Apache Flink handles stateful stream processing, offering advantages for complex analytics use cases\\r\\n* Leveraging Flink's Table API and SQL capabilities to express complex transformations with familiar syntax\\r\\n* Implementing real-time dashboards with Ktor and other Kotlin libraries\\r\\n\\r\\nBy the end of this session, you'll understand how to bridge the gap between powerful backend stream processing and engaging user interfaces, all while staying in the Kotlin ecosystem. Regardless, if you're a seasoned data streaming engineer or just beginning to explore beyond REST, you'll bring home practical techniques for delivering real-time insights to your users.\\r\\n","speakerIds"\:["4f858987-1a60-4da8-a4a2-045824a496c7"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T13\:00","endsAt"\:"2025-05-23T13\:45","tags"\:["Regular session","Intermediate","Server-side","Other"]},{"id"\:"793518","title"\:"JSpecify\: Java Nullness Annotations and Kotlin","description"\:"Q\: Why should I care about Java nullness annotations?\\r\\n\\r\\nA\: Because they’ll make Kotlin code that uses Java libraries safer, and because they’ll make it easier to convert Java code to Kotlin.\\r\\n\\r\\nJSpecify released a set of nullness annotations for Java in July. Unlike all the other nullness annotations for Java, JSpecify’s are defined by tool-agnostic specification. That means that all the Java nullness analyzers will agree on what they mean, and the Kotlin compiler will too. And that means that your Kotlin code will be able to use null-safe types instead of platform types when it depends on well-annotated Java libraries.\\r\\n\\r\\nIn this talk, we’ll explain how Java nullness annotations will help you, and how JSpecify’s work. We’ll also tease upcoming projects that aren’t about nullness but might help your Kotlin code too.\\r\\n\\r\\n","speakerIds"\:["75ecd7e2-11f7-44f5-a1d3-35e41b4484c2"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T13\:30","endsAt"\:"2025-05-23T13\:45","tags"\:["Lightning talk","Intermediate","Extensibility/Tooling","Other"]},{"id"\:"3256bc2d-68e3-4e30-8367-c6c77e418d25","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T13\:45","endsAt"\:"2025-05-23T14\:00","tags"\:[]},{"id"\:"811915","title"\:"Large Scale Changes with AI - Migrating millions of lines of Java to Kotlin at Uber","description"\:"Uber has one of the largest Android codebases in the world, and while Kotlin is first class, millions of lines of Java remain to be converted. Come along for the ride as we walk you through the tooling and processes we've built and integrated while working with the community to safely mass migrate our production Java code to Kotlin code, which we're now utilizing to scale out more migrations to other technologies. \\r\\n\\r\\nWe'll cover the motivations for tackling a migration of this magnitude, the challenges for LSCs (Large Scale Changes) in huge monorepos and organizations, generating migration data sets to power cutting-edge AI tools, using agentic systems and pipelines to deterministically tackle the migrations at scale, the risks and mitigations for migrating this much production code, how to manage thousands of PRs, and where we'll be taking this technology next.","speakerIds"\:["6a3de662-ef86-4c62-bb68-2f7ebe607f76"],"location"\:"Hall D3","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:45","tags"\:["Regular session","Advanced","Android","Extensibility/Tooling","Language and best practices"]},{"id"\:"796359","title"\:"Data Analysis for finance in Kotlin","description"\:"Data representation and analysis in finance has a large literature already present in R and Python, two of the most common suspects. They have the community, tooling and a long tradition. But what about Kotlin with some of the libraries in the family, like DataFrame and Kandy? Kotlin, traditionally known for its focus in mobile and backend development, has emerged as a strong contender in the data science space. This session explores the potential of Kotlin for financial data analysis, focusing on the use of the DataFrame library and the Kandy visualization framework.\\r\\n\\r\\nWe will demonstrate how Kotlin provides a rich, statically typed language environment, ensuring safety, conciseness, and performance in handling large datasets commonly encountered in financial contexts. DataFrame provides the capacity to manipulate structured data, while Kandy enables high-quality visualizations.\\r\\n\\r\\nThis presentation will also provide a comparative analysis between Kotlin, R, and Python. We will examine common use cases such as dividend history, stock valuation based on price and yields. While R and Python have established ecosystems for data science, Kotlin's performance, tooling, and modern features offer new possibilities for finance professionals looking for a more efficient alternative.\\r\\n\\r\\n\\r\\n","speakerIds"\:["2f606e32-997a-4b74-8420-76a47e7d66a3"],"location"\:"Hall D2","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:45","tags"\:["Regular session","Intermediate","Other"]},{"id"\:"786540","title"\:"Simplifying Full-Stack Kotlin\: A Fresh Take with HTMX and Ktor","description"\:"Being a full-stack developer is valuable in today's tech landscape - you can own features end-to-end, make holistic architectural decisions, and adapt quickly to changing project needs. This versatility is especially crucial in smaller teams and startups.\\r\\n\\r\\nHowever, the role can be intimidating. The list of technologies one is expected to master is extensive\: Kubernetes, Postgres, Kotlin, Gradle, Ktor, React, Remix, Node.js, and NPM. Even the most experienced developers struggle to keep up with it all.\\r\\n\\r\\nPerhaps we should step back and examine this problem from a fresh perspective. Do we truly need all these technologies? After all, HTML and CSS remain relatively stable, unlike frameworks that seem to change every six months.\\r\\n\\r\\nMany applications don't require the complexity of a modern Javascript Single Page Application (SPA). Everything eventually renders to HTML anyway\! Using technologies like HTML, CSS, HTMX, AlpineJS, and Unpoly, you can achieve 98% of SPA functionality with minimal frontend code and less complexity. These tools enhance and build upon HTML and CSS rather than trying to replace them.\\r\\n\\r\\nIn this presentation, I'll show how HTMX and kotlinx.html combine beautifully with Ktor to create modern, interactive web applications. You'll see how these technologies work together seamlessly - Ktor's powerful backend capabilities, kotlinx.html's type-safe HTML generation, and HTMX's elegant approach to frontend interactions. This stack offers a refreshingly simple way to build dynamic web applications while keeping your codebase clean and maintainable.","speakerIds"\:["7dc59117-73e3-47a1-9b41-74768b066fdb"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:45","tags"\:["Regular session","Intermediate","Server-side","Other"]},{"id"\:"798313","title"\:"Swift Export - a peek under the hood","description"\:"One of the most anticipated features in Kotlin Multiplatform—Swift Export\! It’s been a year since we announced its development. Join us as we explore the challenges the team has faced, why it’s taking so long, and, most importantly, how you can preview Swift Export in your own projects.","speakerIds"\:["350f4e01-5d2e-4c02-8ab4-de1fee37092a"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:45","tags"\:["Regular session","Intermediate","Language and best practices"]},{"id"\:"792693","title"\:"Building immersive VR apps for Meta Quest with Jetpack Compose","description"\:"Virtual Reality (VR) is rapidly becoming the future of interactions and immersive experiences, transforming how we engage with apps and content. As VR technology continues to evolve and become mainstream, devices like the Meta Quest offer powerful opportunities for creating highly immersive and interactive experiences. \\r\\n\\r\\nIn this talk, we will explore how to leverage Jetpack Compose to build VR applications for the Meta Quest.\\r\\n\\r\\nWe will dive into the unique challenges of VR development, such as spatial UI design, handling new input methods for seamless experiences. A key focus of this session will be on converting existing Android apps into immersive VR apps, demonstrating how to adapt traditional 2D UIs into spatially aware interfaces suitable for VR environments. \\r\\n\\r\\nAs a bonus, we will take a brief tour of how to integrate 3D objects and scenes seamlessly in the VR experiences. You will learn how to combine both UI elements and 3D content further enhancing immersion and interaction.\\r\\n\\r\\nBy the end of the session, you will be equipped with practical knowledge you can use to create or adapt your existing apps into VR for the Meta Quest with Jetpack Compose along with practical tips and best practices for immersive experiences.","speakerIds"\:["50c71513-a279-4f06-823f-12534a42fbe3"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:15","tags"\:["Lightning talk","Intermediate","Other"]},{"id"\:"897909","title"\:"Migrating Room to Room KMP","description"\:"This Codelab builds off the “Get Started With Kotlin Multiplatform for Shared Business Logic” Codelab, and allows the developer to migrate a Room database to a Room KMP database within the KMP Shared Module, and then leverage this Room KMP database from the Android and iOS app.","speakerIds"\:["6add1648-b639-4177-8da5-c31de8537809","6b8c2666-a975-4a5f-9ee0-5f28f3e445ee"],"location"\:"Room \#173","startsAt"\:"2025-05-23T14\:00","endsAt"\:"2025-05-23T14\:45","tags"\:["Codelab","Intermediate"]},{"id"\:"811570","title"\:"Bringing Maps to Compose Multiplatform with MapLibre Compose","description"\:"Working with maps in a Kotlin Multiplatform app can be tricky—different platform APIs, inconsistent features, and duplicated code add unwelcome complexity. MapLibre Compose simplifies this process by providing a consistent, declarative API built on top of MapLibre and Compose Multiplatform.\\r\\n\\r\\nWe’ll use practical examples to explore the design and implementation of MapLibre Compose, how it leverages the Compose runtime to declaratively express the powerful mapping capabilities of MapLibre, and how it uses Kotlin Multiplatform to help developers write map-based UI code once and run it seamlessly on Android, iOS, and beyond without code duplication.\\r\\n\\r\\nFor developers working with Compose Multiplatform, this talk will showcase how MapLibre Compose can help add mapping features to your apps. You'll gain a clear understanding of its capabilities, its design principles, and how it can help you create richer user experiences across platforms.","speakerIds"\:["8ad4911f-2119-458d-adc0-d6bda35598cd"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T14\:30","endsAt"\:"2025-05-23T14\:45","tags"\:["Lightning talk","Intermediate","Multiplatform"]},{"id"\:"206d31f3-4eb5-461c-9f97-c83166425d78","title"\:"Coffee Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T14\:45","endsAt"\:"2025-05-23T15\:15","tags"\:[]},{"id"\:"784566","title"\:"Kotlin and Compose Multiplatform patterns for iOS interop","description"\:"Kotlin Multiplatform (KMP) and, more recently, Compose Multiplatform (CMP) have matured significantly in recent years and are gaining increasingly widespread adoption. \\r\\n\\r\\nHowever iOS integration continues to present its own set of challenges which also vary depending on the amount of UI code that's being shared. In this talk I'll use real world examples to outline a variety of different UI and non-UI patterns I've applied over the last 5 years when using KMP and CMP on iOS.  \\r\\n","speakerIds"\:["0392772c-28d4-47f6-bd39-47d743fb4a81"],"location"\:"Hall D3","startsAt"\:"2025-05-23T15\:15","endsAt"\:"2025-05-23T16\:00","tags"\:["Regular session","Intermediate","Multiplatform"]},{"id"\:"796464","title"\:"Fast inner dev loops for Kotlin Gradle builds","description"\:"Whether it's a Kotlin library or an Android app, developers want their inner loop to be fast\: code, compile, test, repeat. With Gradle, there are no extra steps—you run the test, and it takes care of the rest, whether you’re tweaking a single line of code or upgrading all your dependencies.\\r\\n\\r\\nIn this talk, learn how to tame the inner dev loop. We'll explore the recent evolution of Gradle's performance features, such as Configuration Cache and Isolated Projects, and how to organize your Kotlin build to make the most of it.","speakerIds"\:["64861870-2216-42e0-baba-1441eb2fb61c","6de24099-9553-48f5-8880-26604621d6af"],"location"\:"Hall D2","startsAt"\:"2025-05-23T15\:15","endsAt"\:"2025-05-23T16\:00","tags"\:["Regular session","Intermediate","Extensibility/Tooling"]},{"id"\:"811421","title"\:"Lessons learned decoupling Architecture Components from platform specific code","description"\:"Follow along as the Android team walks you through the process of taking some of their architectural building blocks, such as SavedState and System Back, through the process of decoupling them from platform specific implementations and how they approached the task of writing good common APIs in preparation for future integrations with other platforms while maintaining the quality achieved in android.","speakerIds"\:["eab98aa1-271b-4e9c-813b-9be6cd892a51","94b516c1-eb48-4f49-be40-c21ba0b73de2"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T15\:15","endsAt"\:"2025-05-23T16\:00","tags"\:["Regular session","Intermediate","Multiplatform","Android"]},{"id"\:"774210","title"\:"Kotlin Clean Architecture for Serverless\: Business Logic You Can Take Anywhere","description"\:"As cloud platforms continue to evolve, serverless functions provide powerful ways to build and scale applications with reduced infrastructure concerns. However, cloud-specific requirements often make it challenging to keep business logic portable across different cloud providers. This session presents a variant of clean architecture designed to separate core business logic from cloud-specific code, leveraging Kotlin’s capabilities along with Spring Cloud Function and headless Gradle modules.\\r\\n\\r\\nIn this talk, I’ll demonstrate how to structure a Kotlin application for serverless using a simplified clean architecture approach. This structure maintains cloud-agnostic business logic while allowing platform-specific implementations for integration functionality like storage. By isolating business logic in headless modules, developers can deploy the same core code across multiple cloud function providers such as AWS Lambda and Azure Functions.\\r\\n\\r\\nThrough live coding, we’ll explore practical techniques for building and deploying serverless applications with cloud-agnostic business logic. \\r\\nThis session is aimed at advanced Kotlin developers interested in serverless architecture, cloud flexibility, and clean architecture principles. ","speakerIds"\:["2b9e0a69-6f25-4704-b819-bdbca519752f"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T15\:15","endsAt"\:"2025-05-23T16\:00","tags"\:["Regular session","Advanced","Server-side"]},{"id"\:"836755","title"\:"Building a macOS screen saver with Kotlin","description"\:"Two years ago, sitting in the audience at KotlinConf, I was mesmerised by the idle animation on the big screen. It was in the style of old school DVD player screen savers, with Kotlin's various logos through the years bouncing from edge to edge.\\r\\n\\r\\nI later found out that this was a pre-rendered video, and not a screen saver that I could just grab and start using. This meant that I had no choice but to build it myself, as a native macOS application running on Kotlin/Native.\\r\\n\\r\\nJoin me for a tale of Kotlin success and macOS failures, as we explore just what it takes to build a screen saver in Kotlin.\\r\\n\\r\\nWe'll see how easy it is to call native platform APIs from Kotlin code, what challenges the development of such an unusual application presents, and how macOS is very much not our friend on this whole journey.","speakerIds"\:["1916ae1c-96d7-480f-9eed-bf5dce444441"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T15\:15","endsAt"\:"2025-05-23T15\:30","tags"\:["Lightning talk","Intermediate","Multiplatform"]},{"id"\:"800400","title"\:"Klibs.io — the dream of creating a Kotlin Package Index","description"\:"So you want to build a Kotlin package index.. What is a package anyway, is it the same as an artifact? What makes a project a library then? And why is it an index and not a repository?\\r\\n\\r\\nThis talk is a story and a retrospective of developing [https\://klibs.io](https\://klibs.io)\\r\\n\\r\\nI will share the insights I learned after processing 250,000 KMP artifacts and 1,500 Kotlin projects. We'll discuss our library sharing ecosystem and its limitations, and I will give tips to library authors on how to stand out and make their libraries more discoverable","speakerIds"\:["68b14adf-80d2-4a38-b6c9-d8c66b343dca"],"location"\:"Auditorium 10 (Lightning talks)","startsAt"\:"2025-05-23T15\:45","endsAt"\:"2025-05-23T16\:00","tags"\:["Lightning talk","Introductory and overview","Multiplatform","Extensibility/Tooling"]},{"id"\:"8f1e6425-9f6e-4be6-8a4d-9ce6376cdcdd","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T16\:00","endsAt"\:"2025-05-23T16\:15","tags"\:[]},{"id"\:"791121","title"\:"47 Refactorings in 45 minutes","description"\:"IntelliJ IDEA's refactoring support is second to none, but the Refactor This menu only has 9 items. Where is all the power hiding?\\r\\n\\r\\nJoin Dmitry and Duncan on a whistle-stop live-coding tour of our favourite IDE's invisible refactorings. Marvel as Alt-Enter reveals refactorings before your very eyes. Gasp as they change depending on context. Wonder how completely different they can be simply by moving the cursor one character to the left or right, and feel the tension mount as they approach the deadline. Can they really show more than one refactoring a minute?","speakerIds"\:["c471c1b0-53d7-45cf-a12c-340714972d83","9aa1160b-ce4f-4992-a1ad-b6da7d62c033"],"location"\:"Hall D3","startsAt"\:"2025-05-23T16\:15","endsAt"\:"2025-05-23T17\:00","tags"\:["Regular session","Intermediate","Extensibility/Tooling"]},{"id"\:"787342","title"\:"From Data to Insights\: Building a Bluesky Bot powered by AI","description"\:"\\r\\nA common challenge developers face when working with data streams is collecting and analyzing this data as fast as possible to uncover meaningful insights or take fast actions.\\r\\n\\r\\nIn this talk, I’ll show you how I tackled this by building a Bluesky bot that turns raw data collected from the Bluesky’s stream of posts into actionable insights.\\r\\n\\r\\nIn this talk you will learn how to\: \\r\\n- Collect data into streams\\r\\n- Use probabilistic data structures such as Bloom Filters, TopK and Count-Min Sketch\\r\\n- Use Retrieval-Augmented Generation for adding your own knowledge base into your LLM queries\\r\\n- Use semantic caching for reducing LLM calls\\r\\n- Use vector siilarity search to classify the data\\r\\n- Efficiently querythe data\\r\\n\\r\\nWhether you’re curious about GenAI, interested in data-driven analytics, or simply love experimenting with creative tech solutions, this session will inspire you with practical techniques and real-world applications.","speakerIds"\:["e27104ba-18b0-43f5-98a7-c7da70111302"],"location"\:"Hall D2","startsAt"\:"2025-05-23T16\:15","endsAt"\:"2025-05-23T17\:00","tags"\:["Regular session","Intermediate","Server-side","Extensibility/Tooling"]},{"id"\:"792742","title"\:"Stream Processing Rocks\! Stream processing in Kotlin from KStreams to RocksDB","description"\:"Ever wondered how to efficiently process high-velocity data streams using Kafka and Kotlin? Join two engineers from SolarWinds—experts who oversee billions of observability records daily—as they share their insights.\\r\\n\\r\\nWe'll kick off by covering what stream processing is and when you should use it. Dive into practical Kotlin solutions through a simple case study on stripping PII from incoming user records using Kafka Streams. We’ll build upon this example by utilizing Kafka's compacting topics feature to distribute the user data and store it locally for rapid API responses. Finally, we’ll 'scale up' by moving that data out of memory and into RocksDB, demonstrating how to handle larger datasets effectively. By the end of this talk, you'll be equipped to build your first KStream or scale up the ones you’re already building.","speakerIds"\:["d4eaf807-51d0-4520-a005-f6cc5051010f","da3f81c7-6cfb-421d-8154-6ca1a68a8dd4"],"location"\:"Auditorium 15","startsAt"\:"2025-05-23T16\:15","endsAt"\:"2025-05-23T17\:00","tags"\:["Regular session","Intermediate","Server-side"]},{"id"\:"782203","title"\:"Scale your Kotlin Multiplatform projects using dependency injection","description"\:"Kotlin-inject-anvil is a dependency injection framework for Kotlin Multiplatform. It verifies the dependency graph at compile time and generates the necessary code to instantiate the object graph at runtime. The framework aims to provide a safe dependency injection solution without the boilerplate and configurations common in many other libraries.\\r\\n\\r\\nThis talk will introduce kotlin-inject-anvil, discussing its benefits and how it scales in large, modularized codebases. We'll explore how to leverage the strengths of each host platform while maximizing common Kotlin Multiplatform code. Since each codebase is unique, I'll demonstrate how we adapt the framework for our own internal use cases at Amazon.","speakerIds"\:["646237bf-ccc5-43fa-a659-0b361b08d651"],"location"\:"Auditorium 11+12","startsAt"\:"2025-05-23T16\:15","endsAt"\:"2025-05-23T17\:00","tags"\:["Regular session","Intermediate","Multiplatform","Language and best practices"]},{"id"\:"f6ee2ddf-3543-47b8-8543-aebe61845b5e","title"\:"Break","description"\:"","speakerIds"\:[],"location"\:"Hall D3","startsAt"\:"2025-05-23T17\:00","endsAt"\:"2025-05-23T17\:15","tags"\:[]},{"id"\:"857092","title"\:"Closing Panel","description"\:"","speakerIds"\:["2d146e58-439f-40ec-9d5b-1dbefdeb707a"],"location"\:"Hall D3","startsAt"\:"2025-05-23T17\:15","endsAt"\:"2025-05-23T18\:00","tags"\:["Regular session","Intermediate","Other"]},{"id"\:"874594","title"\:"Spring Boot With Coroutines and Virtual Threads","description"\:"If you want to get the most out of Spring Boot in terms of low latency, high-throughput, and resource efficiency, there is no way around virtual threads and/or reactive libraries like Webflux.\\r\\n\\r\\nHowever, both won’t get you far\: Virtual threads are limited to non-blocking operations, and WebFlux — even though offering all reactive qualities, like non-blocking, parallelism, streaming, etc. — will give you a lot of headaches due to its complexity, bad readability, and maintainability.\\r\\n\\r\\nIn this workshop, you’ll learn how Spring Boot’s coroutine support will wipe out all the downsides of the ‘raw’ WebFlux approach or the limitations of virtual threads and provide you with the best of both worlds\: non-blocking reactive characteristics without the complexity.\\r\\n\\r\\nDuring the workshop, we will explore Kotlin’s reactive building blocks, such as coroutines and flows, and apply them in Spring Boot. By building a non-blocking API in Spring Boot from scratch, you’ll learn how to\:\\r\\n\\r\\n- Use coroutines on top of WebFlux and/or virtual threads.\\r\\n- Perform non-blocking remote API calls using WebClient or RestClient.\\r\\n- Access a database in a reactive way, either via the R2DBC or JDBC, including framework support.\\r\\n- Apply structured concurrency in your business logic, like requesting data in parallel.\\r\\n- Create an advanced streaming API based on ServerSentEvents that combines coroutines and flow.\\r\\n\\r\\nIn addition, we will explore virtual threads in-depth and see how they can leverage the power of coroutines even more.\\r\\n\\r\\nAt the end of the workshop, you’ll know all the ins and outs of programming in Spring Boot with coroutines while having experienced the tremendous benefits they offer over raw virtual threads or WebFlux.\\r\\n\\r\\nWith the knowledge you gain, you can enlighten your Spring Boot project with coroutines the very next day.","speakerIds"\:["7df2c791-134f-4279-bb68-23f8899bb1ac"],"location"\:"Room \#173","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Intermediate"]},{"id"\:"874598","title"\:"Extracting, Transforming, and Analyzing Data With Kotlin","description"\:"This workshop is designed for all Kotlin developers who need simple and convenient tools within their native ecosystem to assist them when working with data, understanding its nature, performing any necessary processing, and presenting the results to their team or stakeholders as a report or chart.\\r\\n\\r\\nIn this workshop, you’ll learn how to build data processing pipelines in your applications. We’ll explore the best practices for extracting data from various sources, aggregating and transforming it, and then exporting it as a collection of data classes, displaying it as tables, or visualizing it with insightful charts.\\r\\n\\r\\nBy the end of the workshop, you’ll be able to\:\\r\\n\\r\\n- Load, transform, and export data using the Kotlin DataFrame library.\\r\\n- Visualize data with the Kandy library to effectively convey insights.\\r\\n- Access and manipulate data from various sources\: REST APIs, SQL databases, CSV files, and other tabular data.\\r\\n- Handle both flat and hierarchical JSON-like data structures.\\r\\n- Boost your code written with the help of the kotlin.collections or SQL-like frameworks.\\r\\n- Solve practical problems by applying your skills to three real-world scenarios.\\r\\n- Present the insights in Kotlin notebooks and easily share them on GitHub Gists.","speakerIds"\:["1842f7fd-d1eb-4c82-9fa7-1128861990be","8451e1e0-951a-4058-8a22-bb68d2c8f52e"],"location"\:"Room \#174","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Intermediate"]},{"id"\:"874549","title"\:"Hands-On Kotlin Web Development With Ktor","description"\:"Ktor is a lightweight and flexible toolkit for building HTTP applications. This workshop will use the Kotlin programming language, the Ktor framework, the Exposed database access library, OpenAI, and several other Kotlin and Java libraries to build a feature-complete AI powered web application.\\r\\n\\r\\nWe’ll start with the basics by exploring the Ktor framework and learning how to build a simple web application using essential functions. We’ll cover topics like handling HTTP requests, working with WebSockets, database access, authentication, logging, and deployment.\\r\\n\\r\\nFor testing, we will look into the APIs that Ktor provides. Finally, we will explore the API for writing plugins and use it to create a simple plugin for our Ktor application.\\r\\n\\r\\nBy the end of the workshop, you’ll be able to\:\\r\\n  - Structure Ktor projects\\r\\n  - Test Ktor applications\\r\\n  - Create and deploy RESTful services using Ktor\\r\\n  - Integrate Ktor with external libraries\\r\\n\\r\\nThis will be a fast-paced workshop where attendees will spend most of their time coding. You will walk away armed with a cookbook of various Ktor recipes for building feature-complete AI powered web application.","speakerIds"\:["f58eda10-92dc-41a0-ac4a-b1a9f2bd7e97","ea32e9a2-b68e-44c5-b4b7-6d2aa0dc3141","35f8da6a-8cfc-4e0d-9660-f616ca218e93"],"location"\:"Room \#176","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Intermediate"]},{"id"\:"874564","title"\:"Building Shared UI With Compose Multiplatform","description"\:"Take the next step in your cross-platform Kotlin journey with Compose Multiplatform\! This workshop is for developers already familiar with the basics of Kotlin Multiplatform and Jetpack Compose who are looking to extend their skills by building a shared UI.\\r\\n\\r\\nWe’ll discuss how Compose Multiplatform works and show you how your existing Compose skills are reusable across platforms. You’ll have hands-on time with a wide range of Compose features, focusing on how they work across different platforms. During the workshop’s exercises, you’ll work with Compose code, explore APIs, build new features, improve accessibility, test the UI, and more.\\r\\n\\r\\nCovering the latest available APIs and best practices, we’ll equip you with everything you need to start using Compose Multiplatform in your own apps\! Here is how the workshop will be structured\:\\r\\n\\r\\nIntroduction\\r\\n- How Compose Multiplatform works\\r\\n- Running Compose on Android, iOS, Desktop, and Web\\r\\n- Writing basic Compose code for multiplatform use\\r\\n\\r\\nCompose building blocks\\r\\n- Resources (localization, fonts, and more)\\r\\n- Image loading\\r\\n- ViewModels and architecture components\\r\\n- Navigation\\r\\n- Animations\\r\\n- Dependency injection\\r\\n- Theming\\r\\n\\r\\nMastering Compose Multiplatform\\r\\n- Interop with native components\\r\\n- Dialogs\\r\\n- Insets\\r\\n- Accessibility\\r\\n- Testing\\r\\n\\r\\nThis workshop includes exercises for participants to complete on their own laptops. Using a MacBook is highly recommended for participation in all exercises, as iOS applications can only be built on macOS. Detailed setup instructions will be provided prior to the workshop.","speakerIds"\:["1916ae1c-96d7-480f-9eed-bf5dce444441","e21ee3c3-2e72-4fd2-8e5c-30511e30fe66"],"location"\:"Room \#178","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Advanced"]},{"id"\:"874525","title"\:"Deep Dive Into Kotlin Multiplatform\: Advanced Techniques for Seamless Code Sharing","description"\:"This is an intermediate/advanced workshop for experienced Kotlin Multiplatform developers. It is aimed at developers who have built projects with Kotlin Multiplatform and Jetpack Compose / Compose Multiplatform and now want to progress onto more advanced topics.\\r\\n\\r\\nThe workshop aims to equip attendees with the skills to write high-quality code and apps using Kotlin Multiplatform. The workshop will address the following topics\:\\r\\n\\r\\nA Gentle(r) Introduction\\r\\n- Introducing an example project\\r\\n- Explaining project structure and architecture\\r\\n- Highlighting a few key libraries used in the project\\r\\n\\r\\nNative Integrations\\r\\n- Splash screens\\r\\n- Notifications\\r\\n- Working with files\\r\\n\\r\\nAdvanced Kotlin Multiplatform for iOS Targets\\r\\n- Debugging Kotlin/Swift\\r\\n- Understanding and improving Kotlin/Swift interoperability\\r\\n\\r\\nCode Quality\\r\\n- Code coverage with Kover (JVM-only)\\r\\n- Modularization\\r\\n\\r\\nApp Quality\\r\\n- Fixing memory leaks\\r\\n- Performance testing\\r\\n- App size optimization\\r\\n\\r\\nManaging Workflows\\r\\n- Basics of building CI/CD pipelines for your apps\\r\\n\\r\\nYou will need to bring a MacBook along with you to participate in all the practical exercises. Installation instructions will be provided one week prior to the workshop.","speakerIds"\:["62216efe-dd8b-4d8b-9800-1d51b57c4001","abc3f7f7-2169-498e-9311-744fc79e63b8"],"location"\:"Room \#179","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Advanced"]},{"id"\:"874588","title"\:"Refactoring to Functional Kotlin","description"\:"Kotlin supports both Object-oriented and functional styles of programming, but what should we do when we have OO code that should be functional? Refactor, of course\!\\r\\n\\r\\nIn this workshop, Nat and Duncan, the authors of Java to Kotlin\: A Refactoring Guidebook, take a web application and introduce techniques to gradually and safely migrate the code to the functional style better suited to today’s architectures. Topics include\:\\r\\n\\r\\n- Thinking in a functional way – Data, Calculations, and Actions\\r\\n- Migrating from mutable objects to immutable data classes\\r\\n- Converting business logic to a functional domain model\\r\\n- Where does the state live? Functional core / imperative shell\\r\\n- Choosing between functions and methods\\r\\n- Functional error handling\\r\\n- Expand and Contract refactoring for safety over many commits","speakerIds"\:["c471c1b0-53d7-45cf-a12c-340714972d83","30cc8bd5-49a1-4609-bf70-ff5e6b12b3c2"],"location"\:"Room \#180","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Advanced"]},{"id"\:"874482","title"\:"Asynchronous Programming With Kotlin Coroutines","description"\:"In this workshop, you’ll learn everything you need to know about how to be productive with coroutines in Kotlin. We’ll start with the basics of asynchronous programming, its differences from blocking code, and the concepts of suspending functions and coroutines. We’ll explore coroutine contexts, concurrent decomposition of work via deferreds, and structured concurrency with coroutine scopes.\\r\\n\\r\\nThe second part of the workshop will be devoted to Kotlin Flows. We’ll study how Kotlin Flows are designed on a basic level, learn the difference between hot and cold flows, discuss their typical usage patterns, and explore how they incorporate ideas from reactive streams. To deepen our understanding, we’ll also take a peek at some of the implementations behind flows and collectors. Throughout, we’ll see how they help you in writing safe and reliable concurrent systems, and how modern applications can use them to work with asynchronous streams of data, manage system states, and broadcast events.\\r\\n\\r\\nThrough this workshop, you’ll enhance your coroutines-related vocabulary, understand how to spot and avoid common problems, and be able to effectively and confidently use coroutines and flows in your own projects.","speakerIds"\:["a82c6942-6e2b-4d80-9883-0b84b932d6ef","b2a19517-6d18-4ec1-9c40-7e29f4d862b1","94fc2fde-5e41-4ea6-a223-cd61141397f9"],"location"\:"Room \#181","startsAt"\:"2025-05-21T09\:00","endsAt"\:"2025-05-21T17\:00","tags"\:["Workshop","Intermediate"]}],"speakers"\:[{"id"\:"288a938a-17ab-49cb-918a-65f2498a3d2f","name"\:"Alan Viverette","position"\:"Engineering Manager at Google","description"\:"Alan is an engineering manager on the Android Developer Experience team at Google responsible for the Android Jetpack libraries.","photoUrl"\:"https\://sessionize.com/image/ed99-400o400o1-wEjwsHCgtKhQRkaxFCupDQ.jpg"},{"id"\:"94fc2fde-5e41-4ea6-a223-cd61141397f9","name"\:"Alejandro Serrano Mena","position"\:"Researcher @ Kotlin Language Evolution Team","description"\:"Alejandro Serrano Mena is a passionate of formal methods and functional programming in software development, especially using Kotlin and Haskell as languages. He works as researcher in the Kotlin Language Evolution team at JetBrains and helps co-maintaining the Arrow library. He enjoys not only using and improving those tools, but also spreading the word\: he's written four books targeting different levels, regularly gives talks in conferences and meetups.\\r\\n\\r\\nFor quite some time Alejandro was an academic, working on the area of compilers and type systems for functional languages. His PhD thesis versed over error messages, and he's been involved in efforts like improving GHC's support for impredicativity. This knowledge is put in practice in several open source projects, many of them using metaprogramming techniques or compiler extensions.","photoUrl"\:"https\://sessionize.com/image/173d-400o400o1-PJV42A7Rz7BuNqUdVwRDCe.png"},{"id"\:"8451e1e0-951a-4058-8a22-bb68d2c8f52e","name"\:"Aleksei Zinovev","position"\:"JetBrains, TeamLead in Kotlin for Data Science","description"\:"Tempered in the crucible of Apache Hadoop and Apache Spark, the last few years, Alex is working on Machine Learning frameworks for JVM programming languages (Java, Scala, and Kotlin).\\r\\n\\r\\nIn 2017–2020 he worked on an ML module for a distributed in-memory database, Apache Ignite\\r\\n\\r\\n2020 was the year when Alexey created and released the new Deep Learning framework in Kotlin (Kotlin DL https\://github.com/JetBrains/KotlinDL)\\r\\nSince 2023, Alexey has been leading the development and research in the development of data analysis tools in Kotlin.","photoUrl"\:"https\://sessionize.com/image/1cbf-400o400o1-Gysbhh69vwCWmjPC2Wi7w7.jpg"},{"id"\:"64861870-2216-42e0-baba-1441eb2fb61c","name"\:"Alex Semin","position"\:"Software Engineer at Gradle","description"\:"Alex is an enthusiastic team leader and quality-focused developer with a passion for building tools and programming languages. Alex was a Senior Software Engineer at dxFeed, where he led the development of a DSL for time-series analysis and services for real-time market data processing. He is committed to the life-long learning and greatly enjoys sharing his knowledge with others. With the goal of making software even softer, Alex recently joined the Gradle Build Tool team to focus on bringing reliable builds to the masses.","photoUrl"\:"https\://sessionize.com/image/aceb-400o400o1-UDRpSP6rPaLSY66nm9t3x5.png"},{"id"\:"155ea7e0-6dc1-45c7-94c8-055475838101","name"\:"Alexander Sysoev","position"\:"Software Developer at JetBrains","description"\:"Alex is a Software Developer at JetBrains, who is working on creating the kotlinx-rpc for Kotlin.\\r\\nAlready in University, Alex became a Kotlin enthusiast, who is passionate about inventing new ways how to use the language in different projects.","photoUrl"\:"https\://sessionize.com/image/bd8a-400o400o1-EjJwApYJFreJeRtxsKS4ep.jpg"},{"id"\:"51477c3e-3876-4abc-b05f-36658f054d28","name"\:"Alexey Merkulov","position"\:"Software developer in IntelliJ Debugger team, JetBrains","description"\:"I have been working as a software engineer for 16 years. I started my career as a system programmer, so I have big experience in compilers, parsers, JIT and so on. I came to Jet Brains in 2018 and adopted Kotlin around 2019 in my everyday work. I fell in love with Kotlin and it was the reason I joined the Debugger team\: to help make the best tooling for the great language\!","photoUrl"\:"https\://sessionize.com/image/58ea-400o400o1-SLMJDQape2mKwdAWYFJHJw.jpg"},{"id"\:"bc1d17b4-0e64-41ea-8d20-1f52002d339b","name"\:"Anastasiia Birillo","position"\:"Head of Education Research Group, JetBrains Research","description"\:"Researcher - applying experience with the Kotlin compiler and IDE development to educational tools to improve computer science education.\\r\\nEducator - taught Kotlin to undergraduate students at two European universities and authored several in-IDE Kotlin courses and official Kotlin educational materials.\\r\\nKotlin enthusiast - give talks on Kotlin compiler, Kotlin compiler plugins, and Kotlin in general at open events worldwide.","photoUrl"\:"https\://sessionize.com/image/c9df-400o400o1-MxYwEwcvLBTtmAzfjqn7Uc.jpg"},{"id"\:"7dc59117-73e3-47a1-9b41-74768b066fdb","name"\:"Anders Sveen","position"\:"Continuous Delivery, Simpler Technology","description"\:"With 20 years in software development, Anders has held various roles but consistently gravitated toward development and coding. Most recently, he served as lead developer at startups Porterbuddy and ZTL Payments, following a long career in consulting. He's passionate about developing streamlined systems that solve real business challenges. Driven by the belief that tech stack complexity must be reduced, he has focused extensively on DevOps, TDD, and continuous delivery throughout his career. Currently, he works as an independent technical mentor and developer, specializing in continuous delivery practices.","photoUrl"\:"https\://sessionize.com/image/a108-400o400o1-UzxeCCQ2aUtwLwGHapdYg4.png"},{"id"\:"9f7c3264-e8df-4f03-aec6-a75f4abfef19","name"\:"Andrey Zaytsev","position"\:"Architect of JetBrains Fleet","description"\:"I'm a software engineer at JetBrains for 14 years. \\r\\nMy interests span IDEs, UI, databases, distributed systems, functional programming and persistent data structures","photoUrl"\:"https\://sessionize.com/image/52cc-400o400o1-WHaeevU1vJBR6aWyJfCXSq.png"},{"id"\:"38540b03-51ad-4fb1-8bf6-371e814ee221","name"\:"Anshika Koul","position"\:"Senior Software Developer, Posten & Bring AS","description"\:"Anshika has 10 years experience developing software at Posten Bring - Norwegian National Postal Service, building logistics systems and APIs that enable millions of people in the Nordics to order and receive packages. She values studying users, and fostering cross-departmental collaboration to demystify unruly business rules. A typical day at work involves climbing stairs to the 17th floor of Posten Bring’s towering headquarters in the heart of Oslo, where she will transform whiteboard scribbles into deployed features. Off-duty you'll find her chasing sunsets and culinary adventures, sampling flavours from around the globe.","photoUrl"\:"https\://sessionize.com/image/ec31-400o400o1-PYB5sN2fj1fVd2aijhejr1.png"},{"id"\:"6533a51a-e3b3-4b27-8ba7-54a7cf73f728","name"\:"Anthony Bassey","position"\:"Umain mobile developer, loud mouth, tech lover","description"\:"Talkative mobile developer. I found my way to KMP, via a route that took me from the web and react native to finding my way working with KMP.","photoUrl"\:"https\://sessionize.com/image/de1a-400o400o1-EjXWPyoFJHNqTKEDr5vAhV.jpg"},{"id"\:"f58eda10-92dc-41a0-ac4a-b1a9f2bd7e97","name"\:"Anton Arhipov","position"\:"Developer Advocate, JetBrains","description"\:"Anton is a Developer Advocate at JetBrains, working with Kotlin, IntelliJ IDEA, and AI-driven developer tools. With a background in server-side development, he has spent over a decade building software for developers. A Java Champion since 2014, Anton speaks at conferences, shares insights on the Kotlin YouTube channel, and enjoys exploring new ideas in programming languages, AI-powered tooling, and developer workflows. He’s always experimenting with new tech, looking for ways to make coding more efficient and enjoyable.","photoUrl"\:"https\://sessionize.com/image/706d-400o400o1-DetNfUC6HLw7aZZrgSVsoK.jpg"},{"id"\:"7893992d-c5e7-4bcf-8786-68f753ef1404","name"\:"Arkadii Ivanov","position"\:"Staff Software Engineer","description"\:"Software Engineer at X. Passionate about MVI, reactive programming, componentization and testing.","photoUrl"\:"https\://sessionize.com/image/6d7d-400o400o1-hMsX9ZyMRri7dMmAj8ZxfE.jpg"},{"id"\:"350f4e01-5d2e-4c02-8ab4-de1fee37092a","name"\:"Artem Olkov","position"\:"JetBrains, Kotlin/Native, Swift Export","description"\:"iOS Engineer since 2013, KMP Enthusiast since 2018. Spent half a decade transforming a platform-specific mobile dev team into a KMP-oriented one. Moved to JetBrains in 2024 to build Swift Export.","photoUrl"\:"https\://sessionize.com/image/75b7-400o400o1-3uq5H4pCZh72fcij3YjMAT.jpg"},{"id"\:"9f61391f-818f-4b9f-86a2-2fca5fd9a4d7","name"\:"Artur Skowroński","position"\:"Head of Java/Kotlin Engineering at VirtusLab","description"\:"In the industry for ten years. During this time, he has had the opportunity to work in various roles, such as Software Engineer, Tech Lead, Architect, and even Technical Product Manager. This diverse experience enables him to approach problems from a holistic perspective. \\r\\n\\r\\nHe still loves to get his hands dirty - for more than two years, he has been publishing weekly reviews of events in the JVM world - [https\://vived.substack.com/](https\://vived.substack.com/)","photoUrl"\:"https\://sessionize.com/image/30c2-400o400o1-pPJu1x7arJjSmXfA14QoeY.jpg"},{"id"\:"8e2c2869-4beb-4868-8651-8567219ea947","name"\:"Aurimas Liutikas","position"\:"Software Engineer at Google / Gradle Fellow","description"\:"Aurimas is a software engineer at Google working on AndroidX libraries. The need to write efficient code has been instilled in him through his work on Chrome for Android, and later Android OS itself. This drive continued when taking on the build and test infrastructure for AndroidX - one of the largest set of open source libraries built using Gradle. Aurimas enjoys doing talks, blog posts, and generally pushing the Gradle ecosystem forward.","photoUrl"\:"https\://sessionize.com/image/0787-400o400o1-MjSQxhp2Gp7ReDqHMbcjD5.jpg"},{"id"\:"63733e27-0704-401e-a342-8173a51b83c9","name"\:"Brian Norman","position"\:"Kotlin Compiler @ JetBrains","description"\:"Brian Norman has been writing Kotlin in many different areas across the Kotlin ecosystem for years, but may be most known for his work on Kotlin compiler plugins. In 2023, he joined the Kotlin Compiler team at JetBrains, working on the new K2 compiler frontend.","photoUrl"\:"https\://sessionize.com/image/f451-400o400o1-G6XWGq5dkmGby4VB131Xk.jpg"},{"id"\:"5985cca0-e053-46cf-9002-48bded9a43e3","name"\:"Cas van Luijtelaar","position"\:"Development Lead at Umain","description"\:"Testing and implementing the latest cross-platform & native mobile frameworks over the last 6 years.","photoUrl"\:"https\://sessionize.com/image/485b-400o400o1-nHyHR8Vhcf1r6hXn2BYndN.jpg"},{"id"\:"aa4f4219-1d5a-4d23-bcb3-42284ff37fb0","name"\:"Chantal Loncle","position"\:"Software Developer, JetBrains","description"\:"As a Software Developer in the Exposed team at JetBrains, Chantal has been working on maintaining and enhancing the database access library since early 2023.","photoUrl"\:"https\://sessionize.com/image/ff51-400o400o1-XfgQd9Z7pbSXt5ceJ4HPwD.jpg"},{"id"\:"ea8b9ce3-c07c-4683-9e4e-81f6680e896d","name"\:"Chris Horner","position"\:"Android at Cash App","description"\:"Chris is an Android developer working on Cash App from Melbourne, Australia. He enjoys working on apps with a strong focus on UX.","photoUrl"\:"https\://sessionize.com/image/6528-400o400o1-sgmQ1znwqezudXi9wWd5Rs.jpg"},{"id"\:"eb4483f1-306b-447d-9888-648ec0fc0018","name"\:"Chris Sinco","position"\:"UX Design Lead @ Google","description"\:"Chris is the UX Design Lead for Android Studio. He has a passion for creating elegant developer experiences. Prior to Google, he worked on VS Code and Hololens at Microsoft.","photoUrl"\:"https\://sessionize.com/image/3b04-400o400o1-f1-306b-447d-9888-648ec0fc0018.f1f8f009-2f22-403f-9d74-9ebe5d474da9.jpg"},{"id"\:"d4750b02-7983-4201-9740-839fbb3efb08","name"\:"Christian Melchior","position"\:"Kotlin Notebooks @ JetBrains","description"\:"Christian is a Software Developer at JetBrains who has worked on creating better developer tools since 2014. Currently, he is working on the Kotlin Notebooks team, exploring new ways to make software development easier. ","photoUrl"\:"https\://sessionize.com/image/d428-400o400o1-ptaWCwfumgvs7LwwfYRV8t.jpg"},{"id"\:"31fc1d3d-dfe1-40bd-85a1-0ed9cac82dfa","name"\:"Dan Kim","position"\:"Software Engineer, Lover of Dogs, Donut & Pizza Enthusiast","description"\:"Dan is a long time Kotlin enthusiast, having used it for years as an Android developer and now bringing those skills (and love of Kotlin) over to the web. Previously he's worked at companies like Basecamp/37signals and Twitter.\\r\\n\\r\\nOutside of work, Dan is an avid Dad, lover of dogs, and donut and pizza enthusiast.","photoUrl"\:"https\://sessionize.com/image/6d91-400o400o1-QeXor4fKfpaaTC5tbosc3j.jpg"},{"id"\:"2d45da37-3453-4fad-aa68-1f461f08858d","name"\:"Daniil Karol","position"\:"Researcher @ Education Research, JetBrains Research","description"\:"Hi, my name is Daniil and I work at Education Research. I am currently working on the AI Debugger project. I also have experience in teaching practical classes to students at Constructor University on Development in JVM Languages course.","photoUrl"\:"https\://sessionize.com/image/bd4e-400o400o1-EybR8y8Pb3oozpXHyHuKgW.jpg"},{"id"\:"75ecd7e2-11f7-44f5-a1d3-35e41b4484c2","name"\:"David Baker","position"\:"Tech Lead of the Java and Kotlin Ecosystem (JAKE) team at Google","description"\:"David has been working at Google since 2007, in the Java and Kotlin Ecosystem (JAKE) team (formerly known as the Java Core Libraries team) since 2015 (as Tech Lead since 2017). He has worked on open-source libraries including Guice, Dagger, Guava, Compile Testing, and AutoValue; and static analysis tools such as Error Prone and Android Lint. He previously worked on Google Wallet, including its iOS application, and AdWords. Before that, he was a Java software consultant for financial services firms, did software and management at a number of startups, and was Director and then VP Engineering at StarMedia Network, a Latin-American-focused web company in the late 1990s.\\r\\n\\r\\nBefore that, he was a graduate student studying cognitive neuroscience. (Ask him his opinion on LLMs\!)","photoUrl"\:"https\://sessionize.com/image/d653-400o400o1-Ue8Bpd6QFa8BW5YYotc34j.jpg"},{"id"\:"02c37e8c-552f-4a24-b614-f68154b76d08","name"\:"David Herman","position"\:"Ex-Googler, author of Kobweb","description"\:"I am a programmer with 20 years of experience — with the first half in the game industry and the second half at Google. I am currently taking a break from corporate life to work on Kobweb.","photoUrl"\:"https\://sessionize.com/image/1451-400o400o1-7AUJTU3v7DDUVXvTPj7A3G.jpg"},{"id"\:"ffc04f2e-579f-4653-8dad-5779557fd386","name"\:"Diana Montalion","position"\:"Mentrix\: Architecting Systems","description"\:"Diana and her teammates build modern software systems for diverse clients. She has 20+ years experience engineering and architecting software systems for organizations including Stanford, The Gates Foundation, Memorial Sloan Kettering and Teach For All. She has also served as Principal Systems Architect for The Economist and The Wikimedia Foundation. \\r\\n\\r\\nShe wrote the O’Reilly book, Learning Systems Thinking\: Essential Nonlinear Skills & Practices for Software Professionals. Her company, Mentrix, publishes courses and learning materials for aspiring nonlinear thinkers. \\r\\n\\r\\nDiana lives in the Hudson Valley (New York, USA) with three dogs, one cat and nine chickens.","photoUrl"\:"https\://sessionize.com/image/80b2-400o400o1-BMGnQW4NSUjP6oo8KXH31P.jpg"},{"id"\:"9aa1160b-ce4f-4992-a1ad-b6da7d62c033","name"\:"Dmitry Kandalov","position"\:"Software Developer","description"\:"Dmitry has been writing software since DOS times. He spent the last 20 years or so in Java lands, most “recently” working with server-side Kotlin using Extreme programming practices.","photoUrl"\:"https\://sessionize.com/image/fc09-400o400o1-DGR5B38QUBwQDNgjdaFb3P.jpg"},{"id"\:"97821c92-d14b-470b-8311-dc7cafff3c28","name"\:"Dmitry Savvinov","position"\:"Amper Project Lead, JetBrains","description"\:"I joined the Kotlin team in 2016 as an intern. Fun fact\: my Master Thesis was written together with the Kotlin team, and it was what eventually became Kotlin Contracts. Since that time, I worked in almost all parts of Kotlin - Compiler, IDE, Gradle integration, Multiplatform core.\\r\\n\\r\\nAfter leading the Kotlin Multiplatform team for almost 4 years, build tooling piqued my interest as a topic. It quickly became a passion, and I joined the Amper team in 2024 and became the project lead in 2025.","photoUrl"\:"https\://sessionize.com/image/a812-400o400o1-hwWHqL8199Q42DCANEEqWA.jpg"},{"id"\:"c7d1ceec-12db-4c2b-9a93-a9d70b6938cd","name"\:"Dmytro Kurets","position"\:"Software Engineering Team Lead at trivago","description"\:"Being a master's graduate in Geology, I surrendered rocks and minerals for bits and bytes. I began my career in software development as a back-end PHP developer before transitioning to Go. In 2020, I joined trivago, where I shifted my focus to Kotlin and happily stuck with it. Since then, I've expanded my expertise to front-end development, primarily using TypeScript and React. In 2022, I took on a leadership role, guiding a team of back-end and front-end developers. Our work revolves around data-intensive applications, specializing in real-time analysis capabilities.\\r\\n\\r\\nBeyond my professional work, I spend much of my free time co-developing Deltaration.com, an online board game I’m building with a friend. It’s my personal playground for development experiments and a source of endless fun, or so I think. My wife, however, remains skeptical.","photoUrl"\:"https\://sessionize.com/image/2c2d-400o400o1-L8k4oWeGptUBbVwtaz8A5u.png"},{"id"\:"c471c1b0-53d7-45cf-a12c-340714972d83","name"\:"Duncan McGregor","position"\:"Still coding after all these years","description"\:"Duncan has been a professional software developer for over 30 years now. He was lucky enough to be an early adopter of Object Oriented programming, which was the gateway drug to patterns and Extreme Programming, and more recently functional programming in Kotlin. These days he still writes code for a living, coauthored Java to Kotlin\: A Refactoring Guidebook, is a Google Developer Expert, and publishes a weekly YouTube video on Kotlin.\\r\\n\\r\\nHe will try almost anything in his quest for better software, including, but not limited to, actually talking to people. ","photoUrl"\:"https\://sessionize.com/image/55fe-400o400o1-PvFTW6mcgFnwG9vhdZpbgc.jpeg"},{"id"\:"6b8c2666-a975-4a5f-9ee0-5f28f3e445ee","name"\:"Dustin Lam","position"\:"Software Engineer @Google","description"\:"Dustin is an engineer at Google, working on Android's Jetpack libraries, helping make app development easier and more accessible to everyone.","photoUrl"\:"https\://sessionize.com/image/0ad5-400o400o1-a12b9771-1a16-437c-a99d-608bd5a230f0.jpg"},{"id"\:"5b2f8184-971a-400c-982d-c33683fd5d61","name"\:"Ekaterina Petrova","position"\:"Product Marketing Manager @ JetBrains","description"\:"I started my career in IT as an iOS developer back in the days of the iPhone 3GS. I tried different roles and worked as an engineering manager and even a CTO in a small startup. Three years ago, I joined JetBrains as a developer advocate for Kotlin. Now I have become a product marketing manager for Kotlin Multiplatform, as I love mobile development and strongly believe in a crossplatform approach, with Kotlin Multiplatform, of course. 😁  I’m also a co-host of a famous IT podcast for the Russian-speaking audience.\\r\\n","photoUrl"\:"https\://sessionize.com/image/79c1-400o400o1-LNGKJ1jwmmi3aJpteEJprC.jpg"},{"id"\:"2b9e0a69-6f25-4704-b819-bdbca519752f","name"\:"Elena van Engelen","position"\:"Independent Senior Software Engineer","description"\:"I am an expert software engineer with over two decades of experience who is driven by passion for technology. I am also an author of a book, “Kotlin Crash Course”, by BPB Publications.\\r\\nMy current interest is deep diving into the Kotlin language best practices and Kotlin on cloud native. Hobbies include spending time with my kids & family, running, cross-country skiing, ice skating, yoga and fitness","photoUrl"\:"https\://sessionize.com/image/9078-400o400o1-PT8vKyV6wFeq8qfWJQ9TdN.png"},{"id"\:"2f606e32-997a-4b74-8420-76a47e7d66a3","name"\:"Enrique Lopez Manas","position"\:"Google Developer Expert","description"\:"Enrique López Mañas is a Google Developer Expert and independent IT consultant. He has been working with mobile technologies and learning from them since 2007. He is an avid contributor to the open source community and a FLOSS (Free Libre Open Source Software) kind of guy, being among the top 10 open source Java contributors in Germany. He is a part of the Google LaunchPad accelerator, where he participates in Google global initiatives to influence hundreds of the best startups from all around the globe. He is also a big data and machine learning aficionado.\\r\\n\\r\\nIn his free time he rides his bike, take pictures, and travels until exhaustion. He also writes literature and enjoys all kinds of arts. He likes to write about himself in third person. You can follow him on Twitter (@eenriquelopez) to stay updated on his latest movements.","photoUrl"\:"https\://sessionize.com/image/8fa9-400o400o1-p7nSayaFDwjsf5W3ioShCx.jpg"},{"id"\:"ca470696-714f-479a-a230-476cd4a411e7","name"\:"Eric Denman","position"\:"Staff Software Engineer","description"\:"Eric has been building Android apps since 2011, including 4.5 years at Square working on Square Wallet, Square Order, and Caviar.  He jumped onto the KMP bandwagon in 2020 and has been trying to get every team since to use it.  He also enjoys describing himself in the third person and thanks you for reading this.","photoUrl"\:"https\://sessionize.com/image/7178-400o400o1-GMsvRPBd9C2SRNMZZfZFmE.jpg"},{"id"\:"79823093-1b16-4a2b-b0a9-ea4cd25b92f5","name"\:"Erik Hellman","position"\:"Freelance software engineer","description"\:"With more than 25 years of writing software, and 16 working on Android in various forms, Erik has plenty of experience to share. He works as a freelance software developer from his home in Stockholm, Sweden. When he's not working he is unsuccessfully trying to herd his two cats or trying to figure out how to maintain his house.","photoUrl"\:"https\://sessionize.com/image/d66a-400o400o1-93-1b16-4a2b-b0a9-ea4cd25b92f5.4cc61ad2-1d12-4dab-81b4-6c2818bbe6de.jpg"},{"id"\:"2a91775b-ce06-49d2-b1f9-e7e0816cf1f2","name"\:"Filipp Zhinkin","position"\:"JetBrains, Member of the Kotlin libraries team","description"\:"I have a broad development experience in areas ranging from a low-level programming to a high-load backed development. My current focus are Kotlin libraries, and kotlinx-io particularly.","photoUrl"\:"https\://sessionize.com/image/e8bd-400o400o1-DYXigMx6yoThMc1X46gzau.jpg"},{"id"\:"da3f81c7-6cfb-421d-8154-6ca1a68a8dd4","name"\:"Geoff Gerrietts","position"\:"Engineering Manager at Solarwinds","description"\:"Geoff has devoted nearly 30 years of his life to software across many roles\: manager, architect, devops, writer, and engineer. Over the years, he has increasingly focused on performance, efficiency, and measurement of software behavior. He has come to love Kotlin after almost 20 years with Python. \\r\\n\\r\\nGeoff lives outside Boston with his partner, three of their four children, and their dog. In his spare time, he writes poetry and fiction whenever the games he plays can get by without a hero.","photoUrl"\:"https\://sessionize.com/image/faa7-400o400o1-VFjW9Pf6JS8crEaS4Tdumu.jpg"},{"id"\:"2d146e58-439f-40ec-9d5b-1dbefdeb707a","name"\:"Hadi Hariri","position"\:"Never believed in elevator pitches","description"\:"Hadi has been in the IT Industry for over three decades and has been involved in a variety of technologies and platforms. He has been speaking at industry events for over two decades and is a renowned international keynote speaker. Hadi is currently VP of Program Management at JetBrains, overseeing company-wide initiatives.","photoUrl"\:"https\://sessionize.com/image/ce8a-400o400o1-58-439f-40ec-9d5b-1dbefdeb707a.40874e9d-b2c9-4434-9efe-c2759e8b1947.png"},{"id"\:"d4eaf807-51d0-4520-a005-f6cc5051010f","name"\:"Hunter Sherman","position"\:"Senior Staff Software Engineer at Solarwinds - Streaming Platform Team Lead","description"\:"Hunter Sherman is a Senior Staff Software Engineer at SolarWinds with over 14 years of experience in software development and distributed systems, 6 of those using Kotlin.\\r\\nLeading the Streaming Platform and Inference team, his team oversees the processing of billions of observability records adding up to terabytes of events, logs, and metrics daily. He has degrees in Finance and Computer Science, and is currently pursuing a Master's degree in Artificial Intelligence at the University of Texas at Austin.","photoUrl"\:"https\://sessionize.com/image/f899-400o400o1-VSwncuzU36nk7rXT9fupBE.jpg"},{"id"\:"2d41d3fb-3321-4b47-a401-ae84a5de2423","name"\:"Huyen Tue Dao","position"\:"Randomly Typing | Android + Kotlin Google Developer Expert ","description"\:"Huyen Tue Dao is an Android developer and Google Developer Expert for Android and Kotlin. She previously worked as an Android developer at Trello and Adobe. Huyen also co-hosts the \\"Android Faithful\\" podcast as part of the Daily Tech News Show network.\\r\\n\\r\\nHuyen lives in Denver, CO though is often found in the DC Metro area. When not programming, she is moving (kettlebells, HIIT, dance, yoga, strength) and gaming (video, board, card, mobile, anything).","photoUrl"\:"https\://sessionize.com/image/65aa-400o400o1-n2AHF6pBXM6ML5n55i7UE9.jpg"},{"id"\:"9f2b5627-1d42-423f-a6e9-f5e5e356edee","name"\:"Ian Botsford","position"\:"Sr. Software Development Engineer at AWS","description"\:"Ian Botsford is a senior engineer at AWS. He's a fan of big data, microservices, and functional programming. He's been a Kotlin developer for 4 years and still keeps discovering 